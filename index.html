<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F0F12">
<title>Agent Experiments — Amber's Daily Mini-Apps</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>">
<style>
  :root {
    --bg: #0F0F12;
    --surface: #16161B;
    --surface-2: #1E1E25;
    --border: rgba(255,255,255,0.08);
    --text: #EDECEF;
    --muted: #8B8A92;
    --accent: #B5A4FF;
    --accent-2: #FFB48C;
    --success: #7DDDB7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(181, 164, 255, 0.08), transparent 50%),
      radial-gradient(circle at 80% 100%, rgba(255, 180, 140, 0.06), transparent 50%);
  }
  .container { max-width: 880px; margin: 0 auto; padding: 48px 24px 96px; }
  header { margin-bottom: 56px; }
  .logo {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 24px;
  }
  .logo-mark { font-size: 18px; }
  h1 {
    font-size: clamp(32px, 5vw, 44px);
    font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.1; margin-bottom: 16px;
  }
  .tagline { font-size: 17px; color: var(--muted); max-width: 560px; }
  .stats { display: flex; gap: 32px; margin-top: 28px; flex-wrap: wrap; }
  .stat-num { font-size: 24px; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
  .section-label {
    font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
  }
  .apps { display: grid; gap: 14px; }
  .app {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    text-decoration: none; color: inherit; display: block;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .app:hover, .app:focus-visible {
    transform: translateY(-2px);
    border-color: rgba(181, 164, 255, 0.3);
    background: var(--surface-2); outline: none;
  }
  .app-top {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 16px; margin-bottom: 6px; flex-wrap: wrap;
  }
  .app-title { font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
  .app-date { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .app-tag {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    padding: 3px 8px; border-radius: 6px;
    background: rgba(181, 164, 255, 0.12); color: var(--accent);
    margin-bottom: 10px;
  }
  .app-tag.delightful { background: rgba(255, 180, 140, 0.12); color: var(--accent-2); }
  .app-tag.trend     { background: rgba(125, 221, 183, 0.12); color: var(--success); }
  .app-tag.business  { background: rgba(255, 220, 120, 0.12); color: #FFD978; }
  .app-line { font-size: 15px; color: var(--muted); }
  .app-meta { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  .app-link { font-size: 13px; color: var(--accent); }
  .empty {
    border: 1px dashed var(--border);
    border-radius: 16px; padding: 48px 24px; text-align: center;
    color: var(--muted);
  }
  footer {
    margin-top: 64px; padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted); font-size: 13px; text-align: center;
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><span class="logo-mark">🦄</span><span>Agent Experiments</span></div>
      <h1>One mini-app a day, built overnight by Amber's agent crew.</h1>
      <p class="tagline">Productivity tools, delightful toys, trend prototypes, and business ideas — shipped while you sleep.</p>
      <div class="stats">
        <div><div class="stat-num" id="stat-count">—</div><div class="stat-label">apps shipped</div></div>
        <div><div class="stat-num" id="stat-latest">—</div><div class="stat-label">latest drop</div></div>
        <div><div class="stat-num">∞</div><div class="stat-label">going daily</div></div>
      </div>
    </header>

    <div class="section-label">Recent drops</div>
    <div class="apps" id="apps-list">
      <div class="empty">Loading…</div>
    </div>

    <footer>
      Built by Ada for Amber · Source on
      <a href="https://github.com/amberbockel/agent-experiments">GitHub</a>
    </footer>
  </div>

<script>
const TAG_CLASS = { productivity: '', delightful: 'delightful', trend: 'trend', business: 'business' };

async function load() {
  const list = document.getElementById('apps-list');
  try {
    const res = await fetch('manifest.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('manifest missing');
    const data = await res.json();
    const apps = (data.apps || []).slice().sort((a, b) => b.date.localeCompare(a.date));

    document.getElementById('stat-count').textContent = apps.length;
    document.getElementById('stat-latest').textContent = apps[0] ? formatDate(apps[0].date) : '—';

    if (!apps.length) {
      list.innerHTML = '<div class="empty">First app drops tomorrow morning. ☕</div>';
      return;
    }

    list.innerHTML = apps.map(app => {
      const tagClass = TAG_CLASS[(app.category || '').toLowerCase()] || '';
      return `
        <a class="app" href="apps/${app.date}/" aria-label="${app.title}">
          <div class="app-top">
            <div class="app-title">${app.title}</div>
            <div class="app-date">${formatDate(app.date)}</div>
          </div>
          <span class="app-tag ${tagClass}">${app.category || 'app'}</span>
          <div class="app-line">${app.oneLiner || ''}</div>
          <div class="app-meta"><span class="app-link">Open →</span></div>
        </a>
      `;
    }).join('');
  } catch (e) {
    list.innerHTML = '<div class="empty">First app drops tomorrow morning. ☕</div>';
    document.getElementById('stat-count').textContent = '0';
  }
}

function formatDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  return dt.toLocaleDateString('en-US', { timeZone: 'UTC', month: 'short', day: 'numeric' });
}

load();
</script>
</body>
</html>
