<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Context Snapshot</title>
<style>
* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  padding-top: max(env(safe-area-inset-top), 20px);
  padding-bottom: max(env(safe-area-inset-bottom), 20px);
}
.container {
  width: 100%;
  max-width: 480px;
  padding: 20px;
}
.header {
  text-align: center;
  margin-bottom: 32px;
}
h1 {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 8px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.subtitle {
  font-size: 16px;
  opacity: 0.9;
  line-height: 1.5;
}
.card {
  background: white;
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  margin-bottom: 16px;
  color: #1C1C1E;
}
.action-card {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.btn {
  width: 100%;
  padding: 20px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.btn:active {
  transform: scale(0.97);
}
.btn-primary {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  box-shadow: 0 6px 20px rgba(102,126,234,0.4);
}
.btn-secondary {
  background: #F2F2F7;
  color: #667eea;
  font-weight: 600;
}
.btn-secondary:active {
  background: #E5E5EA;
}
.emoji {
  font-size: 24px;
}
.snapshot-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.snapshot-item {
  background: #F9F9FB;
  border-radius: 12px;
  padding: 16px;
  border: 2px solid transparent;
  transition: all 0.2s;
}
.snapshot-item:active {
  border-color: #667eea;
  background: #F2F2F7;
}
.snapshot-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.snapshot-time {
  font-size: 13px;
  font-weight: 600;
  color: #667eea;
}
.snapshot-label {
  font-size: 15px;
  font-weight: 600;
  color: #1C1C1E;
  margin-bottom: 8px;
}
.snapshot-note {
  font-size: 14px;
  color: #666;
  line-height: 1.4;
  margin-bottom: 12px;
}
.snapshot-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.tag {
  font-size: 12px;
  font-weight: 600;
  background: #E5E5EA;
  color: #666;
  padding: 4px 10px;
  border-radius: 999px;
}
.snapshot-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.btn-small {
  flex: 1;
  padding: 10px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-small:active {
  transform: scale(0.95);
}
.btn-restore {
  background: #667eea;
  color: white;
}
.btn-delete {
  background: #FF3B30;
  color: white;
}
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #999;
}
.empty-emoji {
  font-size: 48px;
  margin-bottom: 16px;
}
.empty-text {
  font-size: 15px;
  line-height: 1.6;
}
.capture-form {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.form-label {
  font-size: 14px;
  font-weight: 600;
  color: #666;
}
textarea {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  border: 2px solid #E5E5EA;
  border-radius: 12px;
  font-family: inherit;
  resize: vertical;
  min-height: 80px;
}
textarea:focus {
  outline: none;
  border-color: #667eea;
}
.hidden {
  display: none !important;
}
.stats {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  flex: 1;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 16px;
  border-radius: 16px;
  text-align: center;
  border: 2px solid rgba(255,255,255,0.2);
}
.stat-value {
  font-size: 32px;
  font-weight: 700;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 12px;
  font-weight: 600;
  opacity: 0.8;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📸 Context Snapshot</h1>
    <div class="subtitle">Save your mental state before interruptions.</div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="totalSnapshots">0</div>
      <div class="stat-label">Snapshots</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="todayCount">0</div>
      <div class="stat-label">Today</div>
    </div>
  </div>

  <!-- Main Actions -->
  <div class="card action-card" id="mainActions">
    <button class="btn btn-primary" id="captureBtn">
      <span class="emoji">📸</span>
      <span>Capture Context</span>
    </button>
    <button class="btn btn-secondary" id="viewBtn">
      <span class="emoji">📋</span>
      <span>View Snapshots (<span id="snapshotCount">0</span>)</span>
    </button>
  </div>

  <!-- Capture Form -->
  <div class="card hidden" id="captureForm">
    <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 16px;">What are you working on?</h2>
    <div class="capture-form">
      <div class="form-group">
        <label class="form-label">Quick note (optional)</label>
        <textarea id="noteInput" placeholder="e.g., Reviewing PR #234, fixing auth bug, researching React patterns..."></textarea>
      </div>
      <button class="btn btn-primary" id="saveBtn">
        <span>Save Snapshot</span>
      </button>
      <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
    </div>
  </div>

  <!-- Snapshot List -->
  <div class="card hidden" id="snapshotList">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h2 style="font-size: 20px; font-weight: 700;">Your Snapshots</h2>
      <button class="btn btn-secondary" id="backBtn" style="width: auto; padding: 10px 16px; font-size: 14px;">Back</button>
    </div>
    <div id="snapshots" class="snapshot-list"></div>
  </div>
</div>

<script>
let snapshots = [];

// Load snapshots
function loadSnapshots() {
  const saved = localStorage.getItem('contextSnapshots');
  if (saved) {
    snapshots = JSON.parse(saved);
  }
  updateStats();
  updateCount();
}

function saveSnapshots() {
  localStorage.setItem('contextSnapshots', JSON.stringify(snapshots));
  updateStats();
  updateCount();
}

function updateStats() {
  document.getElementById('totalSnapshots').textContent = snapshots.length;
  
  const today = new Date().toDateString();
  const todayCount = snapshots.filter(s => new Date(s.timestamp).toDateString() === today).length;
  document.getElementById('todayCount').textContent = todayCount;
}

function updateCount() {
  document.getElementById('snapshotCount').textContent = snapshots.length;
}

// Format time
function formatTime(timestamp) {
  const date = new Date(timestamp);
  const now = new Date();
  const diff = now - date;
  
  if (diff < 60000) return 'Just now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  
  const days = Math.floor(diff / 86400000);
  if (days === 1) return 'Yesterday';
  if (days < 7) return `${days} days ago`;
  
  return date.toLocaleDateString();
}

function formatFullTime(timestamp) {
  const date = new Date(timestamp);
  return date.toLocaleString('en-US', {
    month: 'short',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  });
}

// Capture context
document.getElementById('captureBtn').addEventListener('click', () => {
  document.getElementById('mainActions').classList.add('hidden');
  document.getElementById('captureForm').classList.remove('hidden');
  document.getElementById('noteInput').focus();
});

document.getElementById('cancelBtn').addEventListener('click', () => {
  document.getElementById('captureForm').classList.add('hidden');
  document.getElementById('mainActions').classList.remove('hidden');
  document.getElementById('noteInput').value = '';
});

document.getElementById('saveBtn').addEventListener('click', () => {
  const note = document.getElementById('noteInput').value.trim();
  
  const snapshot = {
    id: Date.now(),
    timestamp: Date.now(),
    note: note || 'No description',
    url: window.location.href
  };
  
  snapshots.unshift(snapshot);
  saveSnapshots();
  
  document.getElementById('noteInput').value = '';
  document.getElementById('captureForm').classList.add('hidden');
  document.getElementById('mainActions').classList.remove('hidden');
  
  alert('📸 Context saved!');
});

// View snapshots
document.getElementById('viewBtn').addEventListener('click', () => {
  renderSnapshots();
  document.getElementById('mainActions').classList.add('hidden');
  document.getElementById('snapshotList').classList.remove('hidden');
});

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('snapshotList').classList.add('hidden');
  document.getElementById('mainActions').classList.remove('hidden');
});

// Render snapshots
function renderSnapshots() {
  const container = document.getElementById('snapshots');
  
  if (snapshots.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-emoji">📭</div>
        <div class="empty-text">
          No snapshots yet.<br>
          Capture your context before your next interruption!
        </div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = snapshots.map(s => `
    <div class="snapshot-item">
      <div class="snapshot-header">
        <span class="snapshot-time">${formatFullTime(s.timestamp)}</span>
      </div>
      <div class="snapshot-label">Context Snapshot</div>
      <div class="snapshot-note">${s.note}</div>
      <div class="snapshot-meta">
        <span class="tag">${formatTime(s.timestamp)}</span>
      </div>
      <div class="snapshot-actions">
        <button class="btn-small btn-restore" onclick="restoreSnapshot(${s.id})">
          Resume Context
        </button>
        <button class="btn-small btn-delete" onclick="deleteSnapshot(${s.id})">
          Delete
        </button>
      </div>
    </div>
  `).join('');
}

// Restore snapshot
function restoreSnapshot(id) {
  const snapshot = snapshots.find(s => s.id === id);
  if (!snapshot) return;
  
  alert(`📸 Restoring context:\n\n"${snapshot.note}"\n\nSaved: ${formatFullTime(snapshot.timestamp)}`);
}

// Delete snapshot
function deleteSnapshot(id) {
  if (!confirm('Delete this snapshot?')) return;
  
  snapshots = snapshots.filter(s => s.id !== id);
  saveSnapshots();
  renderSnapshots();
}

// Initialize
loadSnapshots();
</script>

</body>
</html>
