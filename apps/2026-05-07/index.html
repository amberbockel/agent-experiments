<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Creative Product Pricer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg: #F2F2F7;
            --surface: #FFFFFF;
            --text: #1C1C1E;
            --text-secondary: #6E6E73;
            --accent: #D4A574;
            --accent-dark: #B8865A;
            --border: #E5E5EA;
            --shadow: rgba(0, 0, 0, 0.08);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 17px;
            line-height: 1.5;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            min-height: 100vh;
        }
        
        .container {
            max-width: 640px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        
        header {
            margin-bottom: 32px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        
        .subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.4;
        }
        
        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px var(--shadow);
        }
        
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }
        
        .label-hint {
            font-weight: 400;
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 2px;
        }
        
        input[type="number"],
        select {
            width: 100%;
            padding: 12px 16px;
            font-size: 17px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        select {
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%236E6E73' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            padding-right: 44px;
        }
        
        .radio-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .radio-option {
            flex: 1;
            min-width: 140px;
        }
        
        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }
        
        .radio-option label {
            display: block;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 15px;
        }
        
        .radio-option input[type="radio"]:checked + label {
            border-color: var(--accent);
            background: rgba(212, 165, 116, 0.08);
            color: var(--accent-dark);
        }
        
        .button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .button:active {
            background: var(--accent-dark);
        }
        
        .result {
            display: none;
            margin-top: 24px;
        }
        
        .result.show {
            display: block;
        }
        
        .price-range {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            color: white;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .price-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .price-value {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }
        
        .price-subtext {
            font-size: 15px;
            opacity: 0.85;
            margin-top: 4px;
        }
        
        .breakdown {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
        }
        
        .breakdown-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }
        
        .breakdown-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 15px;
        }
        
        .breakdown-row + .breakdown-row {
            border-top: 1px solid var(--border);
        }
        
        .breakdown-label {
            color: var(--text-secondary);
        }
        
        .breakdown-value {
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }
        
        .note {
            margin-top: 16px;
            padding: 16px;
            background: rgba(212, 165, 116, 0.08);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        
        .reset-btn {
            margin-top: 16px;
            width: 100%;
            padding: 14px;
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Creative Product Pricer</h1>
            <p class="subtitle">Price your creative work with confidence — calculate value-based rates for originals, prints, licensing, and workshops.</p>
        </header>
        
        <div class="card">
            <div class="card-title">Your Base Rate</div>
            <div class="form-group">
                <label>
                    Experience Level
                    <div class="label-hint">Sets your hourly rate foundation</div>
                </label>
                <select id="experience">
                    <option value="50">Emerging Artist ($50/hr)</option>
                    <option value="100">Established Artist ($100/hr)</option>
                    <option value="200">Premium Artist ($200/hr)</option>
                    <option value="custom">Custom Rate</option>
                </select>
            </div>
            <div class="form-group" id="customRateGroup" style="display: none;">
                <label>Custom Hourly Rate</label>
                <input type="number" id="customRate" min="10" step="5" placeholder="Enter $/hour">
            </div>
        </div>
        
        <div class="card">
            <div class="card-title">Product Details</div>
            <div class="form-group">
                <label>Product Type</label>
                <select id="productType">
                    <option value="original">Original Artwork</option>
                    <option value="limited">Limited Edition Print</option>
                    <option value="open">Open Edition Print</option>
                    <option value="licensing">Licensing Deal</option>
                    <option value="workshop">Workshop/Class</option>
                </select>
            </div>
            <div class="form-group">
                <label>
                    Materials Cost
                    <div class="label-hint">Canvas, paint, printing, framing, etc.</div>
                </label>
                <input type="number" id="materials" min="0" step="5" placeholder="$0">
            </div>
            <div class="form-group">
                <label>
                    Hours Invested
                    <div class="label-hint">Total time spent creating</div>
                </label>
                <input type="number" id="hours" min="0.5" step="0.5" placeholder="0">
            </div>
            <div class="form-group">
                <label style="margin-bottom: 12px;">Market Positioning</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="positioning" id="pos-emerging" value="1.0" checked>
                        <label for="pos-emerging">Emerging</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="positioning" id="pos-established" value="1.5">
                        <label for="pos-established">Established</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="positioning" id="pos-premium" value="2.0">
                        <label for="pos-premium">Premium</label>
                    </div>
                </div>
            </div>
            <button class="button" onclick="calculate()">Calculate Price</button>
        </div>
        
        <div class="result" id="result">
            <div class="price-range">
                <div class="price-label">Recommended Price</div>
                <div class="price-value" id="priceValue">$0</div>
                <div class="price-subtext" id="priceRange"></div>
            </div>
            
            <div class="breakdown">
                <div class="breakdown-title">Breakdown</div>
                <div class="breakdown-row">
                    <span class="breakdown-label">Materials</span>
                    <span class="breakdown-value" id="breakdownMaterials">$0</span>
                </div>
                <div class="breakdown-row">
                    <span class="breakdown-label">Labor</span>
                    <span class="breakdown-value" id="breakdownLabor">$0</span>
                </div>
                <div class="breakdown-row">
                    <span class="breakdown-label">Market Multiplier</span>
                    <span class="breakdown-value" id="breakdownMultiplier">1.0×</span>
                </div>
                <div class="breakdown-row">
                    <span class="breakdown-label">Product Type Adjustment</span>
                    <span class="breakdown-value" id="breakdownAdjustment">—</span>
                </div>
            </div>
            
            <div class="note" id="note"></div>
            
            <button class="reset-btn" onclick="reset()">Calculate Another</button>
        </div>
    </div>
    
    <script>
        // Load saved rate
        const savedRate = localStorage.getItem('creativeRate');
        if (savedRate) {
            const expSelect = document.getElementById('experience');
            const rates = ['50', '100', '200'];
            if (rates.includes(savedRate)) {
                expSelect.value = savedRate;
            } else {
                expSelect.value = 'custom';
                document.getElementById('customRate').value = savedRate;
                document.getElementById('customRateGroup').style.display = 'block';
            }
        }
        
        // Toggle custom rate input
        document.getElementById('experience').addEventListener('change', function() {
            const customGroup = document.getElementById('customRateGroup');
            if (this.value === 'custom') {
                customGroup.style.display = 'block';
            } else {
                customGroup.style.display = 'none';
            }
        });
        
        function calculate() {
            // Get base rate
            const expSelect = document.getElementById('experience');
            let hourlyRate;
            if (expSelect.value === 'custom') {
                hourlyRate = parseFloat(document.getElementById('customRate').value);
                if (!hourlyRate || hourlyRate < 10) {
                    alert('Please enter a valid custom rate');
                    return;
                }
            } else {
                hourlyRate = parseFloat(expSelect.value);
            }
            
            // Save rate
            localStorage.setItem('creativeRate', hourlyRate.toString());
            
            // Get inputs
            const materials = parseFloat(document.getElementById('materials').value) || 0;
            const hours = parseFloat(document.getElementById('hours').value);
            const productType = document.getElementById('productType').value;
            const positioning = parseFloat(document.querySelector('input[name="positioning"]:checked').value);
            
            if (!hours || hours <= 0) {
                alert('Please enter hours invested');
                return;
            }
            
            // Calculate base
            const labor = hours * hourlyRate;
            const basePrice = materials + labor;
            
            // Product type multipliers
            const typeMultipliers = {
                'original': 1.0,
                'limited': 0.4,
                'open': 0.15,
                'licensing': 3.0,
                'workshop': 0.8
            };
            
            const typeNotes = {
                'original': 'Originals are 1:1 — full value for unique work.',
                'limited': 'Limited editions (typically 10-50 prints) — 40% of original value per print.',
                'open': 'Open editions — 15% of original value, priced for volume.',
                'licensing': 'Licensing deals should value usage rights and reach — 3× base as starting point.',
                'workshop': 'Workshops — 80% of hourly rate per attendee, scaled for group size.'
            };
            
            const typeMultiplier = typeMultipliers[productType];
            const finalPrice = basePrice * positioning * typeMultiplier;
            
            // Display
            const priceMin = Math.round(finalPrice * 0.9);
            const priceMax = Math.round(finalPrice * 1.1);
            const priceCenter = Math.round(finalPrice);
            
            document.getElementById('priceValue').textContent = '$' + priceCenter.toLocaleString();
            document.getElementById('priceRange').textContent = `Range: $${priceMin.toLocaleString()} – $${priceMax.toLocaleString()}`;
            
            document.getElementById('breakdownMaterials').textContent = '$' + materials.toLocaleString();
            document.getElementById('breakdownLabor').textContent = '$' + Math.round(labor).toLocaleString() + ` (${hours}h × $${hourlyRate}/h)`;
            document.getElementById('breakdownMultiplier').textContent = positioning + '×';
            
            const adjText = productType === 'original' ? 'None (1.0×)' : `${(typeMultiplier * 100).toFixed(0)}%`;
            document.getElementById('breakdownAdjustment').textContent = adjText;
            
            document.getElementById('note').textContent = typeNotes[productType];
            
            document.getElementById('result').classList.add('show');
            document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
        
        function reset() {
            document.getElementById('result').classList.remove('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
