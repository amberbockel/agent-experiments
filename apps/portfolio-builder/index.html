<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7">
<title>Amber Miro · Portfolio Builder</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
<style>
  :root {
    --bg: #F2F2F7;
    --surface: #FFFFFF;
    --surface-2: #F9F9FB;
    --text: #1C1C1E;
    --text-2: #3C3C43;
    --text-3: #8E8E93;
    --border: rgba(60, 60, 67, 0.12);
    --border-strong: rgba(60, 60, 67, 0.2);
    --accent: #2D4A3E; /* Amber's forest green */
    --accent-soft: #E8A5A5; /* blush */
    --accent-warm: #D4A574; /* gold */
    --success: #34C759;
    --warning: #FF9500;
    --danger: #FF3B30;
    --florals: #E8A5A5;
    --abstracts: #B5A4FF;
    --landscapes: #7DDDB7;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
    --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }
  button { cursor: pointer; font-family: inherit; }
  input, textarea, select { font-family: inherit; }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100dvh;
  }
  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; }
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100dvh;
    overflow-y: auto;
  }
  @media (max-width: 768px) {
    .sidebar {
      position: fixed; top: 0; left: 0; right: 0;
      width: 100%; height: auto;
      padding: 0;
      border-right: none;
      border-bottom: 1px solid var(--border);
      z-index: 100;
      backdrop-filter: blur(12px) saturate(180%);
      background: rgba(255,255,255,0.85);
    }
  }
  .brand-block {
    margin-bottom: 28px;
    padding: 0 8px;
  }
  @media (max-width: 768px) { .brand-block { display: none; } }
  .brand-name {
    font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--text);
  }
  .brand-sub {
    font-size: 12px; color: var(--text-3); margin-top: 2px; letter-spacing: 0.02em;
  }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  @media (max-width: 768px) {
    .nav {
      flex-direction: row;
      overflow-x: auto;
      padding: 8px 12px;
      scroll-snap-type: x mandatory;
      gap: 4px;
    }
    .nav::-webkit-scrollbar { display: none; }
  }
  .nav-btn {
    display: flex; align-items: center; gap: 12px;
    width: 100%; padding: 10px 12px;
    background: transparent; border: none;
    border-radius: var(--radius-md);
    color: var(--text-2); font-size: 15px; font-weight: 500;
    text-align: left;
    transition: all 120ms var(--ease-out);
    white-space: nowrap;
  }
  @media (max-width: 768px) {
    .nav-btn { width: auto; flex: 0 0 auto; padding: 8px 14px; font-size: 14px; }
  }
  .nav-btn:hover { background: var(--bg); color: var(--text); }
  .nav-btn.active {
    background: var(--accent);
    color: #fff;
  }
  .nav-icon { font-size: 16px; line-height: 1; }
  .nav-count {
    margin-left: auto;
    background: var(--bg);
    padding: 2px 7px;
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    color: var(--text-3);
  }
  .nav-btn.active .nav-count {
    background: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.9);
  }
  .nav-divider { height: 1px; background: var(--border); margin: 12px 8px; }

  /* Sync block */
  .sync-block {
    margin-top: auto;
    padding: 12px;
    background: var(--surface-2);
    border-radius: var(--radius-md);
    margin: 16px 8px 0;
  }
  @media (max-width: 768px) { .sync-block { display: none; } }
  .sync-title { font-size: 12px; font-weight: 600; color: var(--text-2); margin-bottom: 6px; letter-spacing: 0.02em; text-transform: uppercase; }
  .sync-meta { font-size: 11px; color: var(--text-3); margin-bottom: 8px; line-height: 1.4; }
  .sync-btn {
    display: flex; align-items: center; gap: 6px; justify-content: center;
    width: 100%; padding: 8px;
    background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600;
    transition: all 120ms var(--ease-out);
  }
  .sync-btn:hover { transform: translateY(-1px); }
  .sync-btn:active { transform: translateY(0); }
  .sync-btn.ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); margin-top: 6px; }

  /* Main content */
  .main {
    padding: 32px 32px 96px;
    overflow-y: auto;
  }
  @media (max-width: 768px) {
    .main { padding: 80px 16px 96px; }
  }

  .page-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
  }
  .page-title {
    font-size: 28px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2;
  }
  .page-sub { font-size: 15px; color: var(--text-3); margin-top: 4px; max-width: 600px; }
  .page-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 16px; border-radius: var(--radius-md);
    font-size: 14px; font-weight: 600;
    border: none; transition: all 120ms var(--ease-out);
  }
  .btn-primary {
    background: var(--accent); color: #fff;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-secondary {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--bg); }
  .btn-ghost {
    background: transparent; color: var(--text-2);
  }
  .btn-ghost:hover { background: var(--bg); color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); }
  .btn-danger:hover { background: rgba(255,59,48,0.08); }

  /* Filters */
  .filters {
    display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;
    padding: 6px;
    background: var(--surface);
    border-radius: var(--radius-md);
    width: fit-content;
    border: 1px solid var(--border);
  }
  .filter-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    background: transparent; color: var(--text-2);
    border: none;
    transition: all 120ms var(--ease-out);
  }
  .filter-pill:hover { background: var(--bg); color: var(--text); }
  .filter-pill.active {
    background: var(--accent); color: #fff;
  }
  .filter-pill .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Pieces grid */
  .pieces-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }
  .piece-card {
    background: var(--surface);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--border);
    transition: all 200ms var(--ease-out);
    cursor: pointer;
    display: flex; flex-direction: column;
  }
  .piece-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--border-strong);
  }
  .piece-image {
    aspect-ratio: 1;
    background: var(--bg);
    background-size: cover;
    background-position: center;
    position: relative;
    border-bottom: 1px solid var(--border);
  }
  .piece-image-empty {
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3); font-size: 13px;
  }
  .piece-cat-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(255,255,255,0.95);
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    color: var(--text-2);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; gap: 4px;
  }
  .piece-info { padding: 14px 16px; flex: 1; display: flex; flex-direction: column; }
  .piece-title {
    font-size: 15px; font-weight: 600; letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .piece-title-empty { color: var(--text-3); font-style: italic; font-weight: 400; }
  .piece-meta {
    font-size: 12px; color: var(--text-3); display: flex; gap: 6px;
    margin-bottom: 12px;
  }
  .piece-price { font-weight: 600; color: var(--text-2); }
  .piece-status {
    display: flex; gap: 4px; margin-top: auto;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border-strong);
  }
  .status-dot.done { background: var(--success); }

  .add-piece-card {
    background: transparent;
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius-lg);
    aspect-ratio: 1.1;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px;
    color: var(--text-3); font-size: 14px; font-weight: 500;
    transition: all 120ms var(--ease-out);
  }
  .add-piece-card:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(45,74,62,0.03);
  }
  .add-piece-card .plus { font-size: 28px; line-height: 1; }

  /* Modal (piece editor) */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 16px;
    overflow-y: auto;
    animation: fade-in 200ms var(--ease-out);
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slide-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-xl);
    width: 100%; max-width: 720px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: slide-up 250ms var(--ease-out);
    overflow: hidden;
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .modal-title { font-size: 18px; font-weight: 600; }
  .modal-close {
    background: var(--bg); border: none;
    width: 32px; height: 32px; border-radius: 50%;
    color: var(--text-2); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 24px; max-height: calc(100dvh - 200px); overflow-y: auto; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
    background: var(--surface-2);
  }

  /* Form */
  .form-row { display: grid; gap: 16px; margin-bottom: 16px; }
  .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
  @media (max-width: 540px) {
    .form-row.cols-2, .form-row.cols-3 { grid-template-columns: 1fr; }
  }
  .field-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-2); margin-bottom: 6px;
    letter-spacing: 0.02em; text-transform: uppercase;
  }
  .field-input, .field-textarea, .field-select {
    width: 100%;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text); font-size: 15px;
    transition: all 120ms var(--ease-out);
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
  }
  .field-input:focus, .field-textarea:focus, .field-select:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }
  .field-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .field-select { cursor: pointer; }

  /* Image upload */
  .image-uploader { margin-bottom: 20px; }
  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 8px;
  }
  .image-slot {
    aspect-ratio: 1;
    background: var(--surface-2);
    border: 2px dashed var(--border-strong);
    border-radius: var(--radius-md);
    overflow: hidden;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 120ms var(--ease-out);
  }
  .image-slot:hover { border-color: var(--accent); }
  .image-slot.has-image { border-style: solid; border-color: var(--border); }
  .image-slot img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .image-slot-label {
    position: absolute; bottom: 6px; left: 6px; right: 6px;
    background: rgba(255,255,255,0.95);
    padding: 2px 8px; border-radius: 999px;
    font-size: 10px; font-weight: 600;
    color: var(--text-2);
    backdrop-filter: blur(4px);
    text-align: center;
    letter-spacing: 0.02em; text-transform: uppercase;
  }
  .image-slot-remove {
    position: absolute; top: 6px; right: 6px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,0.6);
    color: #fff; border: none; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .image-slot-empty {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    color: var(--text-3); font-size: 11px; font-weight: 500;
  }
  .image-slot-empty .icon { font-size: 18px; }

  /* Routing checkboxes */
  .routing-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .routing-check {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all 120ms var(--ease-out);
  }
  .routing-check:hover { border-color: var(--border-strong); }
  .routing-check.active {
    background: rgba(45,74,62,0.06);
    border-color: var(--accent);
  }
  .routing-check input { display: none; }
  .routing-check-box {
    width: 18px; height: 18px;
    border: 2px solid var(--border-strong);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
  }
  .routing-check.active .routing-check-box {
    background: var(--accent); border-color: var(--accent);
  }
  .routing-check-label { font-size: 13px; font-weight: 500; }

  /* Status checkboxes (compact) */
  .status-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px;
  }
  .status-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px; font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    transition: all 120ms var(--ease-out);
  }
  .status-chip.active {
    background: rgba(52,199,89,0.1);
    border-color: var(--success);
    color: var(--success);
  }
  .status-chip .check { display: none; font-size: 11px; }
  .status-chip.active .check { display: inline; }

  /* Documents */
  .doc-list { display: flex; flex-direction: column; gap: 12px; }
  .doc-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display: flex; gap: 16px; align-items: center;
    transition: all 120ms var(--ease-out);
  }
  .doc-card:hover { border-color: var(--border-strong); box-shadow: var(--shadow-sm); }
  .doc-icon {
    width: 44px; height: 44px;
    background: var(--surface-2);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .doc-info { flex: 1; min-width: 0; }
  .doc-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .doc-audience { font-size: 13px; color: var(--text-3); }
  .doc-status {
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .doc-status.not-started { background: var(--surface-2); color: var(--text-3); }
  .doc-status.drafting { background: rgba(255,149,0,0.12); color: var(--warning); }
  .doc-status.review { background: rgba(45,74,62,0.1); color: var(--accent); }
  .doc-status.done { background: rgba(52,199,89,0.12); color: var(--success); }
  .doc-pieces { font-size: 12px; color: var(--text-3); margin-top: 4px; }

  /* Tasks */
  .sprint { margin-bottom: 24px; }
  .sprint-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 12px;
  }
  .sprint-title { font-size: 16px; font-weight: 600; }
  .sprint-progress { font-size: 13px; color: var(--text-3); }
  .task-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    margin-bottom: 6px;
    transition: all 120ms var(--ease-out);
  }
  .task-item.done {
    opacity: 0.55;
  }
  .task-item.done .task-text { text-decoration: line-through; }
  .task-check {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 2px solid var(--border-strong);
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px;
    margin-top: 1px;
  }
  .task-check.checked {
    background: var(--accent); border-color: var(--accent);
  }
  .task-content { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; color: var(--text); margin-bottom: 2px; }
  .task-meta { font-size: 12px; color: var(--text-3); }
  .task-owner {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px; font-weight: 600;
    margin-right: 6px;
  }
  .task-owner.amber { background: rgba(232,165,165,0.15); color: #B47373; }
  .task-owner.ada { background: rgba(181,164,255,0.15); color: #6B5BA8; }
  .task-owner.both { background: rgba(125,221,183,0.15); color: #2F8C66; }

  /* Brand page */
  .brand-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px; font-weight: 600;
    color: var(--text-2); margin-bottom: 12px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .brand-color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .brand-color {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 6px;
    background: var(--surface-2);
    border-radius: 999px;
    font-family: 'SF Mono', 'Monaco', monospace;
    font-size: 12px;
    color: var(--text-2);
  }
  .brand-color-swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
  }

  /* Empty states */
  .empty-state {
    padding: 64px 24px;
    text-align: center;
    color: var(--text-3);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .empty-msg { font-size: 14px; max-width: 420px; margin: 0 auto; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--radius-md);
    font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-md);
    z-index: 300;
    animation: slide-up 200ms var(--ease-out);
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand-block">
      <div class="brand-name">Amber Miro</div>
      <div class="brand-sub">Portfolio Builder</div>
    </div>

    <nav class="nav" id="nav">
      <button class="nav-btn active" data-mode="pieces">
        <span class="nav-icon">🌸</span>
        <span>Pieces</span>
        <span class="nav-count" id="count-pieces">0</span>
      </button>
      <button class="nav-btn" data-mode="documents">
        <span class="nav-icon">📄</span>
        <span>Documents</span>
        <span class="nav-count" id="count-documents">9</span>
      </button>
      <button class="nav-btn" data-mode="tasks">
        <span class="nav-icon">✓</span>
        <span>Tasks</span>
        <span class="nav-count" id="count-tasks">0</span>
      </button>
      <button class="nav-btn" data-mode="outreach">
        <span class="nav-icon">📬</span>
        <span>Outreach</span>
        <span class="nav-count" id="count-outreach">0</span>
      </button>
      <button class="nav-btn" data-mode="brand">
        <span class="nav-icon">✨</span>
        <span>Brand</span>
      </button>
    </nav>

    <div class="sync-block">
      <div class="sync-title">Sync with Ada</div>
      <div class="sync-meta" id="sync-meta">No exports yet</div>
      <button class="sync-btn" id="export-btn">📤 Export to send Ada</button>
      <button class="sync-btn ghost" id="import-btn">📥 Import update from Ada</button>
      <input type="file" id="import-file" accept=".json" hidden>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div id="screen-pieces" class="screen"></div>
    <div id="screen-documents" class="screen" hidden></div>
    <div id="screen-tasks" class="screen" hidden></div>
    <div id="screen-outreach" class="screen" hidden></div>
    <div id="screen-brand" class="screen" hidden></div>
  </main>
</div>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ============================================================
// STATE & STORAGE
// ============================================================
const STORAGE_KEY = 'amber-miro-portfolio-v1';

const DEFAULT_STATE = {
  version: 1,
  lastUpdated: null,
  lastExportedAt: null,
  categories: [
    { id: 'florals', name: 'Florals', emoji: '🌸', color: '#E8A5A5', description: 'Mid-century modern + Rifle Paper Co.-inspired florals' },
    { id: 'abstracts', name: 'Abstracts', emoji: '🎨', color: '#B5A4FF', description: 'Bold geometric and color-driven abstract work' },
    { id: 'landscapes', name: 'Landscapes', emoji: '🏞️', color: '#7DDDB7', description: 'Atmospheric landscapes with City Pop / Mid-Century influence' }
  ],
  tiers: [
    { id: 'print', name: 'Print', minPrice: 25, maxPrice: 75 },
    { id: 'small', name: 'Small Original', minPrice: 200, maxPrice: 600 },
    { id: 'mid', name: 'Mid Original', minPrice: 800, maxPrice: 2500 },
    { id: 'statement', name: 'Statement Piece', minPrice: 3000, maxPrice: 10000 }
  ],
  pieces: [],
  documents: [
    { id: 'gallery-packet', name: 'Gallery Submission Packet', emoji: '🏛️', audience: 'Galleries, juried shows, journalists', status: 'not-started', pieceIds: [] },
    { id: 'designer-sales', name: 'Designer / Hospitality Sales Sheet', emoji: '🏠', audience: 'Interior designers, hotels, hospitality buyers', status: 'not-started', pieceIds: [] },
    { id: 'press-onepager', name: 'Press One-Pager', emoji: '📰', audience: 'Local arts journalists', status: 'not-started', pieceIds: [] },
    { id: 'cafe-outreach', name: 'Café Outreach Email + Image Set', emoji: '☕', audience: 'Cafés, restaurants, salons', status: 'not-started', pieceIds: [] },
    { id: 'collector-brief', name: 'Collector Brief', emoji: '🎯', audience: 'Serious buyers, commission inquiries', status: 'not-started', pieceIds: [] },
    { id: 'show-kit', name: 'Show Display Kit', emoji: '🎪', audience: 'In-person foot traffic at shows / fairs / pop-ups', status: 'not-started', pieceIds: [] },
    { id: 'website-upgrade', name: 'ambermiro.com Upgrade', emoji: '🌐', audience: 'Anyone who Googles you', status: 'not-started', pieceIds: [] },
    { id: 'etsy-listings', name: 'Etsy Listings', emoji: '🛍️', audience: 'Decorators, gifters, search-driven buyers', status: 'not-started', pieceIds: [] },
    { id: 'pinterest-pins', name: 'Pinterest Pins', emoji: '📌', audience: 'Decorators, gifters with high intent', status: 'not-started', pieceIds: [] }
  ],
  brand: {
    artistStatement: '',
    bio: '',
    voiceNotes: 'Mid-Century Modern + 80s Japanese City Pop. Forest Green / Blush / Warm Grey / Gold. Rifle Paper Co. positioning — controlled, collectible, gift-worthy.',
    primaryColors: [
      { hex: '#2D4A3E', name: 'Forest Green' },
      { hex: '#E8A5A5', name: 'Blush' },
      { hex: '#A8A29E', name: 'Warm Grey' },
      { hex: '#D4A574', name: 'Gold' }
    ]
  },
  tasks: [
    // Sprint 1
    { id: 't1', sprint: 1, owner: 'amber', text: 'Pick the 12 portfolio pieces (4 per category recommended)', done: false },
    { id: 't2', sprint: 1, owner: 'amber', text: 'Set price tiers across all 4 levels', done: false },
    { id: 't3', sprint: 1, owner: 'both', text: 'Approve artist statement (Ada drafts → Amber edits)', done: false },
    { id: 't4', sprint: 1, owner: 'ada', text: 'Build all 6 Concord-area outreach lists', done: false },
    { id: 't5', sprint: 1, owner: 'ada', text: 'Build the master outreach tracker', done: false },
    // Sprint 2
    { id: 't6', sprint: 2, owner: 'amber', text: 'Photo session — 12 pieces × 3 angles each', done: false },
    { id: 't7', sprint: 2, owner: 'both', text: 'Bio + CV (Amber provides facts, Ada formats)', done: false },
    { id: 't8', sprint: 2, owner: 'both', text: 'Website upgrade specs (Press, Available Works, newsletter)', done: false },
    // Sprint 3
    { id: 't9', sprint: 3, owner: 'both', text: 'Gallery Submission Packet (Ada designs, Amber approves)', done: false },
    { id: 't10', sprint: 3, owner: 'both', text: 'Designer Sales Sheet (Ada designs, Amber approves)', done: false },
    { id: 't11', sprint: 3, owner: 'both', text: 'Press One-Pager (Ada designs, Amber approves)', done: false },
    { id: 't12', sprint: 3, owner: 'both', text: 'Café Outreach email template (Ada drafts, Amber approves)', done: false },
    { id: 't13', sprint: 3, owner: 'both', text: 'Collector Brief (Ada designs, Amber approves)', done: false },
    // Sprint 4
    { id: 't14', sprint: 4, owner: 'both', text: 'Etsy launch — 5 listings (Ada writes, Amber photographs + opens shop)', done: false },
    { id: 't15', sprint: 4, owner: 'both', text: 'Pinterest setup (Ada writes, Amber pins)', done: false },
    { id: 't16', sprint: 4, owner: 'both', text: 'Show Display Kit print files (Ada designs, Amber orders)', done: false },
    // Sprint 5
    { id: 't17', sprint: 5, owner: 'ada', text: 'Outreach automation goes live (scheduled sends + follow-ups)', done: false },
    { id: 't18', sprint: 5, owner: 'amber', text: 'Instagram 30-day rework — context reels + DM-to-sale flow', done: false },
    { id: 't19', sprint: 5, owner: 'amber', text: 'Newsletter setup (ConvertKit or similar)', done: false }
  ],
  outreach: []
};

let state = loadState();
let currentMode = 'pieces';
let currentFilter = 'all';
let editingPieceId = null;

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && saved.version) {
      // merge with defaults to pick up any new fields
      return {
        ...DEFAULT_STATE,
        ...saved,
        documents: saved.documents || DEFAULT_STATE.documents,
        tasks: saved.tasks && saved.tasks.length ? saved.tasks : DEFAULT_STATE.tasks,
        brand: { ...DEFAULT_STATE.brand, ...(saved.brand || {}) }
      };
    }
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

function persist() {
  state.lastUpdated = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateCounts();
  updateSyncMeta();
}

// ============================================================
// HELPERS
// ============================================================
function $(sel, root = document) { return root.querySelector(sel); }
function $$(sel, root = document) { return root.querySelectorAll(sel); }
function uid() { return 'p-' + Math.random().toString(36).slice(2, 10); }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}
function fmtPrice(n) {
  if (n == null || n === '') return '';
  return '$' + Number(n).toLocaleString('en-US');
}

function getCategory(id) { return state.categories.find(c => c.id === id); }
function getTier(id) { return state.tiers.find(t => t.id === id); }

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  $('#toast-root').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

function updateCounts() {
  $('#count-pieces').textContent = state.pieces.length;
  $('#count-documents').textContent = state.documents.length;
  $('#count-tasks').textContent = state.tasks.filter(t => !t.done).length;
  $('#count-outreach').textContent = state.outreach.length;
}

function updateSyncMeta() {
  const last = state.lastExportedAt;
  $('#sync-meta').textContent = last
    ? `Last export: ${fmtDate(last)}`
    : 'No exports yet';
}

// ============================================================
// ROUTING
// ============================================================
$$('#nav .nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchMode(btn.dataset.mode));
});

function switchMode(mode) {
  currentMode = mode;
  $$('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  $$('.screen').forEach(s => s.hidden = true);
  $(`#screen-${mode}`).hidden = false;
  if (mode === 'pieces') renderPieces();
  if (mode === 'documents') renderDocuments();
  if (mode === 'tasks') renderTasks();
  if (mode === 'outreach') renderOutreach();
  if (mode === 'brand') renderBrand();
}

// ============================================================
// PIECES MODE
// ============================================================
function renderPieces() {
  const filtered = currentFilter === 'all'
    ? state.pieces
    : state.pieces.filter(p => p.categoryId === currentFilter);

  const filterPills = ['all', ...state.categories.map(c => c.id)].map(id => {
    const cat = id === 'all' ? null : getCategory(id);
    const count = id === 'all' ? state.pieces.length : state.pieces.filter(p => p.categoryId === id).length;
    return `
      <button class="filter-pill ${currentFilter === id ? 'active' : ''}" data-filter="${id}">
        ${cat ? `<span class="dot" style="background: ${cat.color}"></span>${cat.emoji} ${cat.name}` : 'All pieces'}
        <span style="opacity: 0.7; margin-left: 4px;">${count}</span>
      </button>
    `;
  }).join('');

  const piecesHtml = filtered.length === 0 && state.pieces.length === 0
    ? `<div class="empty-state">
        <div class="empty-icon">🌸</div>
        <div class="empty-title">No pieces yet</div>
        <div class="empty-msg">Add your first piece — pick the category, upload an image, set the price. Florals first?</div>
       </div>`
    : `<div class="pieces-grid">
        ${filtered.map(renderPieceCard).join('')}
        <button class="add-piece-card" id="add-piece-btn">
          <span class="plus">+</span>
          <span>Add piece</span>
        </button>
       </div>`;

  $('#screen-pieces').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Pieces</div>
        <div class="page-sub">Your portfolio. Tag each piece by category, upload images, set price + tier, choose which documents it goes into.</div>
      </div>
      <div class="page-actions">
        <button class="btn btn-primary" id="header-add-piece">+ Add piece</button>
      </div>
    </div>
    <div class="filters">${filterPills}</div>
    ${piecesHtml}
  `;

  $$('.filter-pill').forEach(p => p.addEventListener('click', () => {
    currentFilter = p.dataset.filter;
    renderPieces();
  }));
  $$('.piece-card').forEach(c => c.addEventListener('click', () => openPieceModal(c.dataset.id)));
  $('#add-piece-btn')?.addEventListener('click', () => openPieceModal(null));
  $('#header-add-piece').addEventListener('click', () => openPieceModal(null));
}

function renderPieceCard(p) {
  const cat = getCategory(p.categoryId);
  const heroImg = p.images?.clean || p.images?.context || p.images?.detail || null;
  const tier = getTier(p.tierId);
  const statusKeys = ['photographed', 'priced', 'copyReady', 'etsyReady', 'pdfReady'];
  const dots = statusKeys.map(k => `<div class="status-dot ${p.status?.[k] ? 'done' : ''}" title="${k}"></div>`).join('');

  return `
    <div class="piece-card" data-id="${p.id}">
      <div class="piece-image ${!heroImg ? 'piece-image-empty' : ''}" style="${heroImg ? `background-image: url('${heroImg}')` : ''}">
        ${cat ? `<div class="piece-cat-badge"><span style="width:8px;height:8px;border-radius:50%;background:${cat.color}"></span>${cat.emoji} ${cat.name}</div>` : ''}
        ${!heroImg ? '<span>No image yet</span>' : ''}
      </div>
      <div class="piece-info">
        <div class="piece-title ${!p.title ? 'piece-title-empty' : ''}">${escapeHtml(p.title || 'Untitled')}</div>
        <div class="piece-meta">
          ${p.dimensions ? escapeHtml(p.dimensions) : ''}
          ${p.price ? `<span class="piece-price">${fmtPrice(p.price)}</span>` : ''}
          ${tier ? `<span>${tier.name}</span>` : ''}
        </div>
        <div class="piece-status">${dots}</div>
      </div>
    </div>
  `;
}

// ============================================================
// PIECE EDITOR MODAL
// ============================================================
function openPieceModal(id) {
  let piece = id ? state.pieces.find(p => p.id === id) : null;
  const isNew = !piece;
  if (isNew) {
    piece = {
      id: uid(),
      title: '',
      categoryId: currentFilter !== 'all' ? currentFilter : 'florals',
      year: new Date().getFullYear(),
      medium: '',
      dimensions: '',
      tierId: 'small',
      price: '',
      shortDesc: '',
      longDesc: '',
      keywords: '',
      images: { clean: null, context: null, detail: null },
      routing: {},
      status: { photographed: false, priced: false, copyReady: false, etsyReady: false, pdfReady: false },
      createdAt: new Date().toISOString()
    };
  }
  editingPieceId = piece.id;
  renderPieceModal(piece, isNew);
}

function renderPieceModal(p, isNew) {
  const cats = state.categories.map(c =>
    `<option value="${c.id}" ${p.categoryId === c.id ? 'selected' : ''}>${c.emoji} ${c.name}</option>`
  ).join('');
  const tiers = state.tiers.map(t =>
    `<option value="${t.id}" ${p.tierId === t.id ? 'selected' : ''}>${t.name} ($${t.minPrice}–$${t.maxPrice})</option>`
  ).join('');

  const docOptions = state.documents.map(d => {
    const checked = p.routing?.[d.id] === true;
    return `
      <label class="routing-check ${checked ? 'active' : ''}" data-doc="${d.id}">
        <input type="checkbox" ${checked ? 'checked' : ''}>
        <div class="routing-check-box">${checked ? '✓' : ''}</div>
        <div class="routing-check-label">${d.emoji} ${d.name}</div>
      </label>
    `;
  }).join('');

  const statusItems = [
    ['photographed', 'Photographed'],
    ['priced', 'Priced'],
    ['copyReady', 'Copy ready'],
    ['etsyReady', 'Etsy ready'],
    ['pdfReady', 'PDF ready']
  ].map(([k, label]) => {
    const active = p.status?.[k];
    return `<label class="status-chip ${active ? 'active' : ''}" data-status="${k}">
      <span class="check">✓</span>${label}
    </label>`;
  }).join('');

  const imageSlots = ['clean', 'context', 'detail'].map(slot => {
    const img = p.images?.[slot];
    const labels = { clean: 'Clean', context: 'In context', detail: 'Detail' };
    return `
      <label class="image-slot ${img ? 'has-image' : ''}" data-slot="${slot}">
        ${img ? `
          <img src="${img}" alt="${slot}">
          <button class="image-slot-remove" data-remove="${slot}">×</button>
        ` : `
          <div class="image-slot-empty">
            <span class="icon">+</span>
            <span>Add ${labels[slot]}</span>
          </div>
        `}
        <div class="image-slot-label">${labels[slot]}</div>
        <input type="file" accept="image/*" data-upload="${slot}" hidden>
      </label>
    `;
  }).join('');

  $('#modal-root').innerHTML = `
    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${isNew ? 'New piece' : 'Edit piece'}</div>
          <button class="modal-close" data-close>×</button>
        </div>
        <div class="modal-body">
          <div class="image-uploader">
            <label class="field-label">Images (3 angles)</label>
            <div class="image-grid">${imageSlots}</div>
            <div style="font-size: 12px; color: var(--text-3);">Clean = product shot · Context = on a wall / in a room · Detail = texture close-up</div>
          </div>

          <div class="form-row cols-2">
            <div>
              <label class="field-label">Title</label>
              <input class="field-input" type="text" data-field="title" value="${escapeHtml(p.title)}" placeholder="e.g. Peonies in Brass">
            </div>
            <div>
              <label class="field-label">Category</label>
              <select class="field-select" data-field="categoryId">${cats}</select>
            </div>
          </div>

          <div class="form-row cols-3">
            <div>
              <label class="field-label">Year</label>
              <input class="field-input" type="number" data-field="year" value="${p.year || ''}">
            </div>
            <div>
              <label class="field-label">Medium</label>
              <input class="field-input" type="text" data-field="medium" value="${escapeHtml(p.medium)}" placeholder="Watercolor on paper">
            </div>
            <div>
              <label class="field-label">Dimensions</label>
              <input class="field-input" type="text" data-field="dimensions" value="${escapeHtml(p.dimensions)}" placeholder='11" × 14"'>
            </div>
          </div>

          <div class="form-row cols-2">
            <div>
              <label class="field-label">Tier</label>
              <select class="field-select" data-field="tierId">${tiers}</select>
            </div>
            <div>
              <label class="field-label">Price (USD)</label>
              <input class="field-input" type="number" data-field="price" value="${p.price || ''}" placeholder="350">
            </div>
          </div>

          <div class="form-row">
            <div>
              <label class="field-label">Short description (1 sentence)</label>
              <input class="field-input" type="text" data-field="shortDesc" value="${escapeHtml(p.shortDesc)}" placeholder="A quiet study of garden peonies in a Bauhaus brass vessel.">
            </div>
          </div>

          <div class="form-row">
            <div>
              <label class="field-label">Long description (paragraph) — Ada will draft variants when blank</label>
              <textarea class="field-textarea" data-field="longDesc" rows="4" placeholder="Leave blank and Ada will draft 2 variants based on your brand voice + the piece details.">${escapeHtml(p.longDesc)}</textarea>
            </div>
          </div>

          <div class="form-row">
            <div>
              <label class="field-label">Keywords / tags (Etsy + Pinterest SEO)</label>
              <input class="field-input" type="text" data-field="keywords" value="${escapeHtml(p.keywords)}" placeholder="floral wall art, peony print, mid-century modern, blush living room">
            </div>
          </div>

          <div class="form-row">
            <div>
              <label class="field-label">Goes into which documents</label>
              <div class="routing-grid">${docOptions}</div>
            </div>
          </div>

          <div class="form-row">
            <div>
              <label class="field-label">Status</label>
              <div class="status-row">${statusItems}</div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          ${!isNew ? '<button class="btn btn-danger" data-delete>Delete piece</button>' : ''}
          <div style="flex: 1"></div>
          <button class="btn btn-ghost" data-close>Cancel</button>
          <button class="btn btn-primary" data-save>${isNew ? 'Add piece' : 'Save changes'}</button>
        </div>
      </div>
    </div>
  `;

  // Wire up events
  const modal = $('#modal-root .modal');

  $$('[data-close]', modal).forEach(b => b.addEventListener('click', closeModal));
  $('.modal-backdrop').addEventListener('click', e => {
    if (e.target.classList.contains('modal-backdrop')) closeModal();
  });

  $$('[data-field]', modal).forEach(input => {
    input.addEventListener('input', () => {
      const f = input.dataset.field;
      p[f] = f === 'year' || f === 'price' ? (input.value ? Number(input.value) : '') : input.value;
    });
  });

  // Image uploads
  $$('.image-slot[data-slot]', modal).forEach(slot => {
    const input = slot.querySelector('input[type="file"]');
    slot.addEventListener('click', e => {
      if (e.target.closest('[data-remove]')) return;
      input.click();
    });
    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      const dataUrl = await fileToDataUrl(file, 1600);
      const slotName = slot.dataset.slot;
      p.images = p.images || {};
      p.images[slotName] = dataUrl;
      p.status = p.status || {};
      p.status.photographed = !!(p.images.clean);
      renderPieceModal(p, isNew);
    });
  });
  $$('[data-remove]', modal).forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const slotName = btn.dataset.remove;
      p.images = p.images || {};
      p.images[slotName] = null;
      p.status.photographed = !!(p.images.clean);
      renderPieceModal(p, isNew);
    });
  });

  // Routing toggles
  $$('.routing-check', modal).forEach(check => {
    check.addEventListener('click', e => {
      e.preventDefault();
      const docId = check.dataset.doc;
      p.routing = p.routing || {};
      p.routing[docId] = !p.routing[docId];
      renderPieceModal(p, isNew);
    });
  });

  // Status chips
  $$('.status-chip', modal).forEach(chip => {
    chip.addEventListener('click', () => {
      const k = chip.dataset.status;
      p.status = p.status || {};
      p.status[k] = !p.status[k];
      chip.classList.toggle('active', p.status[k]);
    });
  });

  // Save
  $('[data-save]', modal).addEventListener('click', () => {
    if (!p.title.trim() && isNew) {
      showToast('Add a title before saving (placeholder is fine — "Floral 1")');
      return;
    }
    if (isNew) state.pieces.push(p);
    persist();
    closeModal();
    renderPieces();
    showToast(isNew ? 'Piece added' : 'Saved');
  });

  // Delete
  $('[data-delete]', modal)?.addEventListener('click', () => {
    if (confirm('Delete this piece?')) {
      state.pieces = state.pieces.filter(x => x.id !== p.id);
      persist();
      closeModal();
      renderPieces();
      showToast('Deleted');
    }
  });
}

function closeModal() {
  $('#modal-root').innerHTML = '';
  editingPieceId = null;
}

// ============================================================
// IMAGE PROCESSING
// ============================================================
async function fileToDataUrl(file, maxSize = 1600) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        // Resize if larger than maxSize
        const ratio = Math.min(1, maxSize / Math.max(img.width, img.height));
        const w = Math.round(img.width * ratio);
        const h = Math.round(img.height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderDocuments() {
  const docs = state.documents.map(d => {
    const piecesIn = state.pieces.filter(p => p.routing?.[d.id]);
    const statusLabel = {
      'not-started': 'Not started',
      'drafting': 'Drafting',
      'review': 'Review',
      'done': 'Done'
    }[d.status] || d.status;
    return `
      <div class="doc-card">
        <div class="doc-icon">${d.emoji || '📄'}</div>
        <div class="doc-info">
          <div class="doc-name">${escapeHtml(d.name)}</div>
          <div class="doc-audience">${escapeHtml(d.audience)}</div>
          <div class="doc-pieces">${piecesIn.length} piece${piecesIn.length === 1 ? '' : 's'} routed${piecesIn.length ? ' · ' + piecesIn.slice(0,3).map(p => escapeHtml(p.title)).join(', ') + (piecesIn.length > 3 ? '…' : '') : ''}</div>
        </div>
        <div class="doc-status ${d.status}">${statusLabel}</div>
      </div>
    `;
  }).join('');

  $('#screen-documents').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Documents</div>
        <div class="page-sub">The 9 deliverables. Each piece you tag in its modal will route here automatically. Ada drafts the structure + copy; you approve imagery before anything ships.</div>
      </div>
    </div>
    <div class="doc-list">${docs}</div>
  `;
}

// ============================================================
// TASKS MODE
// ============================================================
function renderTasks() {
  const sprints = [1, 2, 3, 4, 5];
  const html = sprints.map(s => {
    const tasks = state.tasks.filter(t => t.sprint === s);
    if (!tasks.length) return '';
    const done = tasks.filter(t => t.done).length;
    const titles = {
      1: 'Sprint 1 — Foundation (this week)',
      2: 'Sprint 2 — Photography & specs (next week)',
      3: 'Sprint 3 — Documents (week 3)',
      4: 'Sprint 4 — Channel launches (week 4)',
      5: 'Sprint 5 — Automation & compounding (week 5+)'
    };
    const items = tasks.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <div class="task-check ${t.done ? 'checked' : ''}" data-task="${t.id}">${t.done ? '✓' : ''}</div>
        <div class="task-content">
          <div class="task-text">
            <span class="task-owner ${t.owner}">${t.owner === 'amber' ? 'You' : t.owner === 'ada' ? 'Ada' : 'Both'}</span>
            ${escapeHtml(t.text)}
          </div>
        </div>
      </div>
    `).join('');
    return `
      <div class="sprint">
        <div class="sprint-header">
          <div class="sprint-title">${titles[s]}</div>
          <div class="sprint-progress">${done}/${tasks.length}</div>
        </div>
        ${items}
      </div>
    `;
  }).join('');

  $('#screen-tasks').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Tasks</div>
        <div class="page-sub">Five sprints, ~5 weeks. Owner tag tells you who's blocking what. Tap to toggle done.</div>
      </div>
    </div>
    ${html}
  `;

  $$('.task-check').forEach(c => c.addEventListener('click', () => {
    const t = state.tasks.find(x => x.id === c.dataset.task);
    if (t) { t.done = !t.done; persist(); renderTasks(); }
  }));
}

// ============================================================
// EXPORT / IMPORT (sync with Ada)
// ============================================================
$('#export-btn').addEventListener('click', () => {
  state.lastExportedAt = new Date().toISOString();
  persist();
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const stamp = new Date().toISOString().slice(0, 10);
  a.download = `amber-miro-portfolio-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported. Send the JSON file to Ada on Telegram.');
});

$('#import-btn').addEventListener('click', () => $('#import-file').click());
$('#import-file').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const incoming = JSON.parse(text);
    if (!incoming.version) throw new Error('Not a valid portfolio export');
    if (!confirm('Replace your current data with this import? Your local changes will be overwritten.')) return;
    state = { ...DEFAULT_STATE, ...incoming };
    persist();
    switchMode(currentMode);
    showToast('Imported. Welcome back.');
  } catch (err) {
    showToast('Import failed: ' + err.message);
  }
  e.target.value = '';
});
