<!DOCTYPE html>
<!-- Updated: 2026-05-05 23:29 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Generator - AI Color Palettes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
            <svg class="sun-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
            </svg>
            <svg class="moon-icon" width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
                <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
            </svg>
        </button>
        
        <header>
            <h1>Color Generator</h1>
            <p class="subtitle">Create beautiful, harmonious color palettes instantly. Pick a base color and apply color theory, or explore trending combinations from the design community.</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label for="color-picker">Base Color</label>
                <input type="color" id="color-picker" value="#2A9D8F">
            </div>
            <div class="control-group">
                <label for="model-select">Color Theory Model</label>
                <select id="model-select">
                    <option value="monochromatic">Monochromatic</option>
                    <option value="complementary">Complementary</option>
                    <option value="analogous">Analogous</option>
                    <option value="triadic">Triadic</option>
                    <option value="tetradic">Tetradic (Square)</option>
                    <option value="split-complementary">Split Complementary</option>
                </select>
            </div>
            <button id="generate-btn">Generate from Base Color</button>
            <button id="random-btn" class="secondary">Random Palette</button>
        </div>

        <div class="section">
            <h2>Your Generated Palette</h2>
            <div class="model-description" id="model-description"></div>
            <div class="palette" id="palette"></div>
            <div class="actions">
                <button id="export-btn" class="secondary">Export as JSON</button>
                <button id="copy-btn" class="secondary">Copy Hex Codes</button>
            </div>
        </div>

        <div class="saved-palettes">
            <h2>Saved Palettes</h2>
            <div id="saved-list"></div>
        </div>

        <div class="section">
            <h2>Trending Palettes</h2>
            <p class="section-subtitle">Popular color combinations from the design community</p>
            <div id="trending-list" class="trending-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
