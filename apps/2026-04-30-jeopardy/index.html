<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="build-version" content="2026-05-02-board-generator">
<meta name="theme-color" content="#060CE9">
<title>Family Jeopardy! 🎤</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>">
<style>
  :root {
    --jeo-blue: #060CE9;
    --jeo-blue-dark: #02078A;
    --jeo-gold: #FFCC00;
    --jeo-gold-dim: #C49A00;
    --tile-bg: #0A14C2;
    --tile-hover: #1322E8;
    --tile-used: #060A5C;
    --text: #FFFFFF;
    --text-dim: #B8C4FF;
    --correct: #2BCB6E;
    --wrong: #FF4D6D;
    --warn: #FFB48C;
    --custom: #B5A4FF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Korinna', 'Times New Roman', Georgia, serif;
    background: var(--jeo-blue);
    color: var(--text);
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    user-select: none; -webkit-user-select: none;
  }
  .app {
    max-width: 980px; margin: 0 auto;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
  }

  /* ===== HEADER ===== */
  header {
    padding: 16px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid var(--jeo-blue-dark);
  }
  .back-btn {
    background: transparent; border: none; color: var(--text-dim);
    font-size: 14px; font-family: inherit; cursor: pointer;
    padding: 6px 10px; border-radius: 6px; min-width: 60px; text-align: left;
  }
  .back-btn:hover { color: var(--text); background: rgba(255,255,255,0.08); }
  .header-title {
    font-weight: 700; font-size: 18px;
    color: var(--jeo-gold);
    text-shadow: 2px 2px 0 var(--jeo-blue-dark);
    letter-spacing: 0.05em;
  }
  .info-btn {
    background: transparent; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; padding: 4px 10px;
    min-width: 60px; text-align: right;
  }
  .info-btn:hover { color: var(--text); }

  /* ===== SCREENS ===== */
  .screen { flex: 1; display: none; flex-direction: column; padding: 16px; }
  .screen.active { display: flex; }

  /* ===== HOME ===== */
  .logo-stack {
    text-align: center;
    margin: 16px 0 24px;
  }
  .logo-text {
    display: inline-block;
    background: var(--jeo-blue-dark);
    padding: 16px 28px;
    border-radius: 12px;
    box-shadow: 0 6px 0 #000033, inset 0 0 0 3px var(--jeo-blue);
    font-weight: 700;
    font-size: clamp(28px, 7vw, 40px);
    color: var(--jeo-gold);
    text-shadow: 3px 3px 0 #000033;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  .logo-text .small {
    display: block; font-size: 0.5em; color: var(--text); margin-top: 4px;
    letter-spacing: 0.15em;
  }

  .players-section { margin-bottom: 20px; }
  .section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--jeo-gold); margin-bottom: 12px;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .player-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .player-input {
    background: var(--jeo-blue-dark); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 10px 14px;
    color: var(--text); font-size: 16px; font-family: inherit;
  }
  .player-input:focus { outline: none; border-color: var(--jeo-gold); }
  .player-color {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--text); cursor: pointer;
  }
  .player-remove {
    background: transparent; border: none; color: var(--text-dim);
    font-size: 24px; cursor: pointer; padding: 0 8px;
  }
  .add-player-btn {
    background: transparent; color: var(--jeo-gold); border: 2px dashed var(--jeo-gold-dim);
    border-radius: 8px; padding: 10px; width: 100%;
    font-size: 14px; cursor: pointer; font-family: inherit;
    margin-top: 4px;
  }
  .add-player-btn:hover { border-color: var(--jeo-gold); background: rgba(255,204,0,0.05); }

  /* ===== BOARD (the new home and play) ===== */
  .board-wrap {
    background: var(--jeo-blue-dark);
    border-radius: 16px;
    padding: 12px;
    margin-bottom: 16px;
    box-shadow: 0 6px 0 #000033;
  }
  .board-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .cat-header {
    background: var(--jeo-blue);
    border: 2px solid var(--jeo-blue-dark);
    border-radius: 8px;
    aspect-ratio: 1 / 0.55;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    font-weight: 700;
    font-size: clamp(10px, 1.8vw, 14px);
    color: var(--jeo-gold);
    text-shadow: 1px 1px 0 #000033;
    padding: 6px 4px;
    line-height: 1.15;
    letter-spacing: 0.02em;
  }
  .clue-tile {
    background: var(--tile-bg);
    border: 2px solid var(--jeo-blue-dark);
    border-radius: 8px;
    aspect-ratio: 1 / 0.95;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: clamp(13px, 3vw, 22px);
    color: var(--jeo-gold);
    text-shadow: 2px 2px 0 #000033;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.1s ease;
    box-shadow: inset 0 0 0 2px var(--jeo-blue);
  }
  .clue-tile:hover, .clue-tile:active {
    transform: scale(1.03);
    background: var(--tile-hover);
  }
  .clue-tile.used {
    background: var(--tile-used);
    color: transparent;
    cursor: default;
    box-shadow: inset 0 0 0 2px var(--jeo-blue-dark);
    pointer-events: none;
  }

  /* ===== SCORES BAR ===== */
  .scores {
    display: flex; gap: 8px; flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 12px;
  }
  .score-pill {
    background: var(--jeo-blue-dark); border: 2px solid var(--jeo-gold-dim);
    border-radius: 999px; padding: 6px 14px;
    font-size: 13px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    display: flex; align-items: center; gap: 6px;
    font-family: 'Korinna', serif;
  }
  .score-pill.lead { border-color: var(--jeo-gold); box-shadow: 0 0 0 2px rgba(255,204,0,0.3); }
  .score-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* ===== ACTION ROW (under board) ===== */
  .action-row {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .action-btn {
    flex: 1; min-width: 140px;
    background: var(--jeo-gold); color: var(--jeo-blue-dark);
    border: none; border-radius: 12px;
    padding: 14px 16px;
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--jeo-gold-dim);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .action-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 var(--jeo-gold-dim);
  }
  .action-btn.secondary {
    background: transparent; color: var(--text);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: none;
  }
  .action-btn.secondary:hover { border-color: var(--text); background: rgba(255,255,255,0.05); }
  .action-btn.danger { background: transparent; color: var(--text-dim); box-shadow: none; border: 1px solid rgba(255,255,255,0.1); }
  .action-btn.danger:hover { color: var(--wrong); border-color: var(--wrong); background: rgba(255,77,109,0.05); }

  /* ===== CLUE SCREEN ===== */
  .clue-display {
    flex: 1;
    display: flex; flex-direction: column;
    background: var(--jeo-blue);
    padding: 20px;
    text-align: center;
  }
  .clue-cat {
    font-size: 13px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-dim);
    margin-bottom: 4px;
    font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .clue-value {
    font-size: clamp(24px, 6vw, 32px); font-weight: 700;
    color: var(--jeo-gold);
    text-shadow: 2px 2px 0 var(--jeo-blue-dark);
    margin-bottom: 24px;
  }
  .clue-text {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(20px, 5vw, 28px);
    line-height: 1.4;
    text-shadow: 2px 2px 0 var(--jeo-blue-dark);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    padding: 16px;
    font-weight: 600;
  }
  .reveal-btn {
    background: var(--jeo-gold); color: var(--jeo-blue-dark);
    border: none; border-radius: 12px;
    padding: 18px 24px;
    font-size: 18px; font-weight: 700; font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--jeo-gold-dim);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }
  .reveal-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 var(--jeo-gold-dim);
  }
  .answer-text {
    font-size: clamp(20px, 5vw, 28px); font-weight: 700;
    color: var(--jeo-gold);
    margin-top: 16px;
    padding: 20px; border: 2px solid var(--jeo-gold);
    border-radius: 12px;
    background: var(--jeo-blue-dark);
  }
  .answer-text.hidden { display: none; }
  .scoring-section { margin-top: 20px; }
  .scoring-prompt {
    text-align: center; font-size: 14px; color: var(--text-dim);
    margin-bottom: 12px; font-family: ui-sans-serif, system-ui, sans-serif;
  }
  .scoring-buttons { display: grid; gap: 8px; }
  .score-btn {
    background: var(--tile-bg); border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 14px;
    color: var(--text); font-family: inherit; font-size: 15px;
    cursor: pointer; display: flex; align-items: center; gap: 12px;
    text-align: left;
  }
  .score-btn:hover { background: var(--tile-hover); border-color: var(--jeo-gold); }
  .score-btn .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .score-btn .label { flex: 1; }
  .score-btn .delta { font-weight: 700; font-variant-numeric: tabular-nums; font-family: 'Korinna', serif; }
  .score-btn.correct .delta { color: var(--correct); }
  .score-btn.wrong .delta { color: var(--wrong); }
  .score-btn.skip {
    background: transparent;
    text-align: center; justify-content: center;
    color: var(--text-dim);
  }

  /* ===== GAME OVER ===== */
  .gameover {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 16px; text-align: center;
  }
  .gameover-title {
    font-size: clamp(32px, 8vw, 48px); font-weight: 700;
    color: var(--jeo-gold);
    text-shadow: 3px 3px 0 var(--jeo-blue-dark);
    margin-bottom: 8px;
  }
  .winner-row {
    display: flex; gap: 12px; align-items: center;
    background: var(--jeo-blue-dark); padding: 16px 24px;
    border-radius: 12px; margin: 24px 0 16px;
    border: 2px solid var(--jeo-gold);
  }
  .winner-emoji { font-size: 40px; }
  .winner-name { font-size: 22px; font-weight: 700; color: var(--jeo-gold); }
  .winner-score {
    font-size: 16px; color: var(--text-dim);
    font-family: ui-sans-serif, system-ui, sans-serif;
    font-variant-numeric: tabular-nums;
  }
  .final-scores { width: 100%; max-width: 320px; margin: 16px 0; }
  .final-row {
    display: flex; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 16px;
  }
  .final-row:last-child { border-bottom: none; }
  .final-name { display: flex; align-items: center; gap: 8px; }
  .final-score {
    font-variant-numeric: tabular-nums; font-weight: 700;
    font-family: 'Korinna', serif;
  }
  .final-score.positive { color: var(--correct); }
  .final-score.negative { color: var(--wrong); }
  .gameover-btns { display: grid; gap: 10px; width: 100%; max-width: 320px; }

  /* ===== BUTTONS ===== */
  .primary-btn {
    background: var(--jeo-gold); color: var(--jeo-blue-dark);
    border: none; border-radius: 12px;
    padding: 16px 24px;
    font-size: 17px; font-weight: 700; font-family: inherit;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--jeo-gold-dim);
    width: 100%;
  }
  .primary-btn:active {
    transform: translateY(3px);
    box-shadow: 0 3px 0 var(--jeo-gold-dim);
  }

  /* ===== FOOTER ===== */
  .home-footer {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .footer-btn {
    flex: 1; min-width: 160px;
    display: inline-flex; align-items: center; justify-content: center;
    gap: 6px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px; font-weight: 500;
    font-family: ui-sans-serif, system-ui, sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .footer-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }

  @media (max-width: 380px) {
    .board-grid { gap: 4px; }
    .clue-tile { font-size: 13px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="back-btn" id="back-btn" style="visibility: hidden;">← Back</button>
    <div class="header-title" id="header-title">FAMILY JEOPARDY!</div>
    <button class="info-btn" id="info-btn" aria-label="Info">ⓘ</button>
  </header>

  <!-- HOME = THE BOARD -->
  <section class="screen active" id="screen-home">
    <div class="logo-stack">
      <div class="logo-text">JEOPARDY!<span class="small">FAMILY EDITION</span></div>
    </div>

    <div class="players-section">
      <div class="section-title">Players</div>
      <div id="players-list"></div>
      <button class="add-player-btn" id="add-player-btn">+ Add player</button>
    </div>

    <div class="section-title">Today's Board</div>
    <div class="scores" id="scores"></div>
    <div class="board-wrap">
      <div class="board-grid" id="home-board"></div>
    </div>

    <div class="action-row">
      <button class="action-btn" id="new-board-btn">🎲 New board</button>
      <button class="action-btn secondary" id="end-game-btn">End round</button>
    </div>

    <div class="home-footer">
      <label class="footer-btn">
        📥 Import a custom pack
        <input type="file" id="import-input" accept=".json" hidden>
      </label>
    </div>
  </section>

  <!-- CLUE SCREEN -->
  <section class="screen" id="screen-clue">
    <div class="clue-display">
      <div class="clue-cat" id="clue-cat">CATEGORY</div>
      <div class="clue-value" id="clue-value">$200</div>
      <div class="clue-text" id="clue-text"></div>
      <button class="reveal-btn" id="reveal-btn">Reveal answer</button>
      <div class="answer-text hidden" id="answer-text"></div>
      <div class="scoring-section" id="scoring-section" style="display: none;">
        <div class="scoring-prompt">Who got it?</div>
        <div class="scoring-buttons" id="scoring-buttons"></div>
      </div>
    </div>
  </section>

  <!-- GAME OVER -->
  <section class="screen" id="screen-gameover">
    <div class="gameover">
      <div class="gameover-title">Round over!</div>
      <div class="winner-row" id="winner-row">
        <div class="winner-emoji">🏆</div>
        <div>
          <div class="winner-name" id="winner-name">—</div>
          <div class="winner-score" id="winner-score">—</div>
        </div>
      </div>
      <div class="final-scores" id="final-scores"></div>
      <div class="gameover-btns">
        <button class="primary-btn" id="play-again-btn">🎲 New board, keep scores</button>
        <button class="footer-btn" id="reset-btn" style="margin-top: 4px;">Reset all scores</button>
      </div>
    </div>
  </section>
</div>

<!-- LOAD CATEGORIES -->
<script src="categories.js"></script>

<script>
// ============================================================
// STATE
// ============================================================
const COLORS = ['#FF6B9D', '#4DD0E1', '#FFCC00', '#7DDDB7', '#B5A4FF', '#FFB48C'];
const STORAGE_KEY = 'family-jeopardy-v2';
const HISTORY_LIMIT_CATEGORIES = 3;  // Don't repeat categories from the last N boards
const HISTORY_LIMIT_CLUES = 60;       // Don't repeat clues from the last N plays

const ALL_CATEGORIES = window.JEOPARDY_CATEGORIES || [];

let state = {
  players: [
    { id: 'p1', name: 'Amber', color: '#FF6B9D', score: 0 },
    { id: 'p2', name: 'William', color: '#4DD0E1', score: 0 },
    { id: 'p3', name: 'Zev', color: '#FFCC00', score: 0 }
  ],
  currentBoard: null,        // { categories: [{ id, name, clues: [{ value, clue, answer, used }] }] }
  currentClue: null,         // { catIdx, value, clue, answer }
  customPacks: [],
  recentCategoryIds: [],     // Cycle through to avoid repeats across boards
  recentClueKeys: []         // Cycle through to avoid repeating individual clues
};

// Load saved state
try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (saved) {
    if (saved.players) state.players = saved.players;
    if (saved.customPacks) state.customPacks = saved.customPacks;
    if (saved.recentCategoryIds) state.recentCategoryIds = saved.recentCategoryIds;
    if (saved.recentClueKeys) state.recentClueKeys = saved.recentClueKeys;
  }
} catch (e) {}

function persist() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    players: state.players,
    customPacks: state.customPacks,
    recentCategoryIds: state.recentCategoryIds,
    recentClueKeys: state.recentClueKeys
  }));
}

// ============================================================
// HELPERS
// ============================================================
function $(s, root = document) { return root.querySelector(s); }
function $$(s, root = document) { return [...root.querySelectorAll(s)]; }
function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getAllCats() {
  return [...ALL_CATEGORIES, ...(state.customPacks || [])];
}

// ============================================================
// BOARD GENERATION (the new core)
// ============================================================
function generateBoard() {
  const all = getAllCats();
  if (all.length < 5) {
    // Fallback: use everything
    return buildBoardFromCats(all);
  }

  // 1. Pick 5 categories preferring ones not in recent history
  const recent = new Set(state.recentCategoryIds);
  const fresh = all.filter(c => !recent.has(c.id));
  const stale = all.filter(c => recent.has(c.id));
  const pool = fresh.length >= 5 ? fresh : [...fresh, ...stale];
  const pickedCats = shuffle(pool).slice(0, 5);

  // 2. Update recent-category ring buffer
  const newRecent = [...pickedCats.map(c => c.id), ...state.recentCategoryIds];
  state.recentCategoryIds = [...new Set(newRecent)].slice(0, HISTORY_LIMIT_CATEGORIES * 5);

  return buildBoardFromCats(pickedCats);
}

function buildBoardFromCats(cats) {
  // For each category, pick one clue per value level ($100/$200/$300/$400/$500),
  // preferring clues not in recent history.
  const recentClues = new Set(state.recentClueKeys);
  const valueOrder = [100, 200, 300, 400, 500];
  const newClueKeys = [];

  const boardCats = cats.slice(0, 5).map(cat => {
    const cluesByValue = {};
    valueOrder.forEach(v => {
      cluesByValue[v] = (cat.clues || []).filter(c => c.value === v);
    });

    const pickedClues = valueOrder.map(value => {
      const candidates = cluesByValue[value] || [];
      if (candidates.length === 0) {
        // No clue at this value? Use any clue from the category.
        const fallback = (cat.clues || [])[0];
        return fallback ? { ...fallback, value } : { value, clue: '(no clue available)', answer: 'N/A' };
      }
      // Prefer fresh
      const keyOf = c => `${cat.id}::${c.clue}`;
      const fresh = candidates.filter(c => !recentClues.has(keyOf(c)));
      const pool = fresh.length > 0 ? fresh : candidates;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      newClueKeys.push(keyOf(pick));
      return { value, clue: pick.clue, answer: pick.answer, used: false };
    });

    return { id: cat.id, name: cat.name, clues: pickedClues };
  });

  // Update recent-clue ring buffer
  state.recentClueKeys = [...newClueKeys, ...state.recentClueKeys].slice(0, HISTORY_LIMIT_CLUES);

  return { categories: boardCats };
}

// ============================================================
// SCREEN ROUTING
// ============================================================
function showScreen(name) {
  $$('.screen').forEach(s => s.classList.remove('active'));
  $('#screen-' + name).classList.add('active');
  const back = $('#back-btn');
  back.style.visibility = (name === 'home') ? 'hidden' : 'visible';
  back.onclick = () => {
    if (name === 'clue') showScreen('home');
    else showScreen('home');
  };
  if (name === 'home') renderHome();
}

// ============================================================
// HOME RENDER (the board lives here)
// ============================================================
function renderHome() {
  // Players
  const list = $('#players-list');
  list.innerHTML = state.players.map(p => `
    <div class="player-row">
      <input class="player-input" data-id="${p.id}" data-field="name" type="text" value="${escapeHtml(p.name)}" maxlength="20" placeholder="Name">
      <button class="player-color" data-id="${p.id}" style="background: ${p.color}"></button>
      ${state.players.length > 1 ? `<button class="player-remove" data-id="${p.id}" aria-label="Remove">×</button>` : '<span></span>'}
    </div>
  `).join('');

  $$('.player-input', list).forEach(inp => {
    inp.addEventListener('input', e => {
      const p = state.players.find(x => x.id === e.target.dataset.id);
      if (p) { p.name = e.target.value; persist(); updateScores(); }
    });
  });
  $$('.player-color', list).forEach(btn => {
    btn.addEventListener('click', () => {
      const p = state.players.find(x => x.id === btn.dataset.id);
      if (!p) return;
      const idx = COLORS.indexOf(p.color);
      p.color = COLORS[(idx + 1) % COLORS.length];
      persist(); renderHome();
    });
  });
  $$('.player-remove', list).forEach(btn => {
    btn.addEventListener('click', () => {
      state.players = state.players.filter(p => p.id !== btn.dataset.id);
      persist(); renderHome();
    });
  });

  // Generate board if none exists
  if (!state.currentBoard || !state.currentBoard.categories || state.currentBoard.categories.length !== 5) {
    state.currentBoard = generateBoard();
    persist();
  }

  renderBoard();
  updateScores();
}

function renderBoard() {
  const board = state.currentBoard;
  if (!board) return;
  const grid = $('#home-board');

  let html = '';
  // Row 1: category headers
  board.categories.forEach(cat => {
    html += `<div class="cat-header">${escapeHtml(cat.name)}</div>`;
  });
  // Rows 2-6: clues at each value
  [100, 200, 300, 400, 500].forEach(value => {
    board.categories.forEach((cat, catIdx) => {
      const clue = cat.clues.find(c => c.value === value);
      const used = clue && clue.used;
      html += `<button class="clue-tile ${used ? 'used' : ''}" data-cat="${catIdx}" data-value="${value}" ${used ? 'disabled' : ''}>$${value}</button>`;
    });
  });

  grid.innerHTML = html;
  grid.style.gridTemplateColumns = 'repeat(5, 1fr)';

  $$('.clue-tile', grid).forEach(tile => {
    if (tile.classList.contains('used')) return;
    tile.addEventListener('click', () => {
      const catIdx = Number(tile.dataset.cat);
      const value = Number(tile.dataset.value);
      openClue(catIdx, value);
    });
  });
}

function updateScores() {
  const max = Math.max(...state.players.map(p => p.score), 0);
  const hasLeader = state.players.some(p => p.score > 0);
  $('#scores').innerHTML = state.players.map(p => `
    <div class="score-pill ${hasLeader && p.score === max ? 'lead' : ''}">
      <span class="score-dot" style="background: ${p.color}"></span>
      <span>${escapeHtml(p.name)}</span>
      <span style="color: ${p.score < 0 ? 'var(--wrong)' : 'inherit'}">${p.score < 0 ? '−$' + Math.abs(p.score) : '$' + p.score}</span>
    </div>
  `).join('');
}

// ============================================================
// CLUE FLOW
// ============================================================
function openClue(catIdx, value) {
  const cat = state.currentBoard.categories[catIdx];
  const clue = cat.clues.find(c => c.value === value);
  if (!clue || clue.used) return;
  state.currentClue = { catIdx, value, clue: clue.clue, answer: clue.answer, catName: cat.name };

  $('#clue-cat').textContent = cat.name;
  $('#clue-value').textContent = '$' + value;
  $('#clue-text').textContent = clue.clue;
  $('#answer-text').textContent = clue.answer;
  $('#answer-text').classList.add('hidden');
  $('#reveal-btn').style.display = '';
  $('#scoring-section').style.display = 'none';
  showScreen('clue');
}

$('#reveal-btn').addEventListener('click', () => {
  $('#answer-text').classList.remove('hidden');
  $('#reveal-btn').style.display = 'none';
  renderScoringButtons();
  $('#scoring-section').style.display = 'block';
});

function renderScoringButtons() {
  const value = state.currentClue.value;
  const root = $('#scoring-buttons');
  root.innerHTML = state.players.map(p => `
    <button class="score-btn correct" data-id="${p.id}" data-result="correct">
      <span class="dot" style="background: ${p.color}"></span>
      <span class="label">${escapeHtml(p.name)}</span>
      <span class="delta">+$${value}</span>
    </button>
    <button class="score-btn wrong" data-id="${p.id}" data-result="wrong">
      <span class="dot" style="background: ${p.color}"></span>
      <span class="label">${escapeHtml(p.name)} got it wrong</span>
      <span class="delta">−$${value}</span>
    </button>
  `).join('') + `
    <button class="score-btn skip" data-result="skip">Nobody got it · skip</button>
  `;

  $$('.score-btn', root).forEach(btn => {
    btn.addEventListener('click', () => {
      const result = btn.dataset.result;
      const id = btn.dataset.id;
      const value = state.currentClue.value;
      if (result === 'correct') {
        const p = state.players.find(x => x.id === id);
        if (p) p.score += value;
      } else if (result === 'wrong') {
        const p = state.players.find(x => x.id === id);
        if (p) p.score -= value;
      }
      // Mark clue used
      const cat = state.currentBoard.categories[state.currentClue.catIdx];
      const c = cat.clues.find(x => x.value === state.currentClue.value);
      if (c) c.used = true;
      persist();

      // All used? End round.
      const allUsed = state.currentBoard.categories.every(c => c.clues.every(cl => cl.used));
      if (allUsed) {
        showScreen('gameover');
        renderGameOver();
      } else {
        showScreen('home');
      }
    });
  });
}

// ============================================================
// NEW BOARD / END / GAME OVER
// ============================================================
$('#new-board-btn').addEventListener('click', () => {
  state.currentBoard = generateBoard();
  persist();
  renderHome();
});

$('#end-game-btn').addEventListener('click', () => {
  showScreen('gameover');
  renderGameOver();
});

function renderGameOver() {
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  const winner = sorted[0];
  $('#winner-name').textContent = winner ? winner.name : '—';
  $('#winner-score').textContent = winner
    ? (winner.score < 0 ? '−$' + Math.abs(winner.score) : '$' + winner.score)
    : '—';
  $('#header-title').textContent = 'ROUND OVER';

  $('#final-scores').innerHTML = sorted.map((p, i) => `
    <div class="final-row">
      <div class="final-name">
        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${p.color}"></span>
        ${i === 0 && p.score > 0 ? '🏆' : ''}
        ${escapeHtml(p.name)}
      </div>
      <div class="final-score ${p.score > 0 ? 'positive' : p.score < 0 ? 'negative' : ''}">${p.score < 0 ? '−$' + Math.abs(p.score) : '$' + p.score}</div>
    </div>
  `).join('');
}

$('#play-again-btn').addEventListener('click', () => {
  // New board, keep scores
  state.currentBoard = generateBoard();
  persist();
  $('#header-title').textContent = 'FAMILY JEOPARDY!';
  showScreen('home');
});

$('#reset-btn').addEventListener('click', () => {
  if (confirm('Reset all scores and start a fresh board?')) {
    state.players.forEach(p => p.score = 0);
    state.currentBoard = generateBoard();
    persist();
    $('#header-title').textContent = 'FAMILY JEOPARDY!';
    showScreen('home');
  }
});

// ============================================================
// ADD PLAYER
// ============================================================
$('#add-player-btn').addEventListener('click', () => {
  if (state.players.length >= 6) return;
  const usedColors = state.players.map(p => p.color);
  const color = COLORS.find(c => !usedColors.includes(c)) || COLORS[0];
  state.players.push({
    id: 'p' + Date.now(),
    name: 'Player ' + (state.players.length + 1),
    color, score: 0
  });
  persist(); renderHome();
});

// ============================================================
// IMPORT CUSTOM PACK
// ============================================================
function handlePackImport(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const packs = Array.isArray(data) ? data : (data.pack ? [data.pack] : (data.clues ? [data] : null));
      if (!packs) throw new Error('Not a recognizable pack file');
      let imported = 0;
      packs.forEach(pack => {
        if (!pack.id || !pack.name || !Array.isArray(pack.clues)) return;
        pack.isCustom = true;
        const idx = (state.customPacks || []).findIndex(p => p.id === pack.id);
        if (idx >= 0) state.customPacks[idx] = pack;
        else state.customPacks.push(pack);
        imported++;
      });
      if (imported === 0) throw new Error('No valid packs found');
      persist();
      alert(`Imported ${imported} pack${imported === 1 ? '' : 's'}! It'll show up in future boards.`);
    } catch (err) {
      alert('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
}

$('#import-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (file) handlePackImport(file);
  e.target.value = '';
});

// ============================================================
// INFO
// ============================================================
$('#info-btn').addEventListener('click', () => {
  alert('Family Jeopardy!\n\n' +
    'Each round shows 5 random categories with 5 clues each. Tap a clue to play it.\n\n' +
    '🎲 New board = different categories, different questions.\n\n' +
    `Total library: ${getAllCats().length} categories, ${getAllCats().reduce((sum, c) => sum + c.clues.length, 0)} questions.\n\n` +
    'Pure tap-and-play. No menus.\n\nMade with 🦄 by Ada.');
});

// ============================================================
// INIT
// ============================================================
showScreen('home');
</script>
