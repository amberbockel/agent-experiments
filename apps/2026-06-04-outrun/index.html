<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OutRun '86 - Beach Highway</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Arial Black', 'Arial Bold', sans-serif;
      touch-action: none;
    }
    
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    .touch-control {
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
      border: 4px solid rgba(255, 255, 255, 0.6);
      border-radius: 50%;
      backdrop-filter: blur(10px);
      touch-action: none;
      pointer-events: all;
      transition: all 0.1s;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .touch-control:active {
      background: rgba(255, 255, 255, 0.4);
      border-color: rgba(255, 200, 0, 1);
      transform: scale(1.1);
    }
    
    .dpad-left {
      bottom: 20px;
      left: 20px;
      width: 80px;
      height: 80px;
    }
    
    .dpad-right {
      bottom: 20px;
      left: 120px;
      width: 80px;
      height: 80px;
    }
    
    .pedal {
      bottom: 20px;
      width: 80px;
      height: 80px;
    }
    
    .pedal-accelerate {
      right: 120px;
    }
    
    .pedal-brake {
      right: 20px;
    }
    
    /* Desktop - hide touch controls */
    @media (min-width: 1024px) and (hover: hover) {
      .touch-control {
        display: none;
      }
    }
    
    /* Landscape mobile */
    @media (max-width: 768px) and (orientation: landscape) {
      .dpad-left, .dpad-right {
        width: 70px;
        height: 70px;
        bottom: 15px;
      }
      
      .dpad-right {
        left: 100px;
      }
      
      .pedal {
        width: 70px;
        height: 70px;
        bottom: 15px;
      }
      
      .pedal-accelerate {
        right: 100px;
      }
      
      .pedal-brake {
        right: 15px;
      }
    }
    
    /* Portrait mobile - larger buttons */
    @media (max-width: 480px) and (orientation: portrait) {
      .dpad-left, .dpad-right {
        width: 90px;
        height: 90px;
        bottom: 25px;
      }
      
      .dpad-right {
        left: 130px;
      }
      
      .pedal {
        width: 90px;
        height: 90px;
        bottom: 25px;
      }
      
      .pedal-accelerate {
        right: 130px;
      }
      
      .pedal-brake {
        right: 25px;
      }
    }
    
    /* Very small screens */
    @media (max-width: 375px) {
      .dpad-left, .dpad-right {
        width: 75px;
        height: 75px;
        bottom: 15px;
      }
      
      .dpad-left {
        left: 15px;
      }
      
      .dpad-right {
        left: 105px;
      }
      
      .pedal {
        width: 75px;
        height: 75px;
        bottom: 15px;
      }
      
      .pedal-accelerate {
        right: 105px;
      }
      
      .pedal-brake {
        right: 15px;
      }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <!-- Touch Controls -->
  <div class="touch-control dpad-left" id="btnLeft">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <path d="M 60 20 L 30 50 L 60 80" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  
  <div class="touch-control dpad-right" id="btnRight">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <path d="M 40 20 L 70 50 L 40 80" fill="none" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  
  <div class="touch-control pedal pedal-accelerate" id="btnAccel">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <path d="M 50 25 L 50 75" fill="none" stroke="#00ff00" stroke-width="8" stroke-linecap="round"/>
      <path d="M 35 40 L 50 25 L 65 40" fill="none" stroke="#00ff00" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  
  <div class="touch-control pedal pedal-brake" id="btnBrake">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <path d="M 50 25 L 50 75" fill="none" stroke="#ff0000" stroke-width="8" stroke-linecap="round"/>
      <path d="M 35 60 L 50 75 L 65 60" fill="none" stroke="#ff0000" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <script>
    // ========================================
    // GAME CONSTANTS & CONFIGURATION
    // ========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const GAME = {
      width: 800,
      height: 600,
      fps: 60,
      segmentLength: 200,
      roadWidth: 2000,
      cameraDepth: 0.84,
      drawDistance: 300,
      fieldOfView: 100,
      resolution: null,
      centrifugal: 0.3
    };
    
    const COLORS = {
      sky: ['#87CEEB', '#00BFFF', '#1E90FF'],
      hills: ['#FF69B4', '#FF1493', '#C71585'],
      grass: { light: '#10AA10', dark: '#009A00' },
      rumble: { light: '#FFFFFF', dark: '#000000' },
      road: { light: '#888888', dark: '#666666' },
      lane: '#FFFFFF',
      fog: '#87CEEB'
    };
    
    const CAR_COLORS = {
      red: '#DC143C',
      darkRed: '#8B0000',
      chrome: '#C0C0C0',
      black: '#000000',
      yellow: '#FFD700',
      white: '#FFFFFF',
      glass: 'rgba(100, 150, 255, 0.5)'
    };
    
    // ========================================
    // GAME STATE
    // ========================================
    let gameState = {
      position: 0,
      speed: 0,
      maxSpeed: 12000,
      accel: 3000,
      breaking: 6000,
      decel: 2000,
      playerX: 0,
      time: 60,
      score: 0,
      gameOver: false,
      lastCheckpoint: 0
    };
    
    let input = {
      left: false,
      right: false,
      accelerate: false,
      brake: false
    };
    
    let roadSegments = [];
    let lastTime = 0;
    
    // ========================================
    // CANVAS SETUP
    // ========================================
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      GAME.resolution = canvas.height / GAME.height;
    }
    
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    // ========================================
    // INPUT HANDLING
    // ========================================
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case 'ArrowLeft': input.left = true; break;
        case 'ArrowRight': input.right = true; break;
        case 'ArrowUp': input.accelerate = true; break;
        case 'ArrowDown': input.brake = true; break;
      }
    });
    
    document.addEventListener('keyup', (e) => {
      switch(e.key) {
        case 'ArrowLeft': input.left = false; break;
        case 'ArrowRight': input.right = false; break;
        case 'ArrowUp': input.accelerate = false; break;
        case 'ArrowDown': input.brake = false; break;
      }
    });
    
    // Touch controls
    function setupTouchControl(id, key) {
      const btn = document.getElementById(id);
      
      // Touch events
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        e.stopPropagation();
        input[key] = true;
      }, { passive: false });
      
      btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        e.stopPropagation();
        input[key] = false;
      }, { passive: false });
      
      btn.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        e.stopPropagation();
        input[key] = false;
      }, { passive: false });
      
      // Mouse events as fallback
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        input[key] = true;
      });
      
      btn.addEventListener('mouseup', (e) => {
        e.preventDefault();
        input[key] = false;
      });
      
      btn.addEventListener('mouseleave', (e) => {
        input[key] = false;
      });
    }
    
    setupTouchControl('btnLeft', 'left');
    setupTouchControl('btnRight', 'right');
    setupTouchControl('btnAccel', 'accelerate');
    setupTouchControl('btnBrake', 'brake');
    
    // ========================================
    // ROAD GENERATION
    // ========================================
    function createRoad() {
      roadSegments = [];
      
      function addSegment(curve, y) {
        const n = roadSegments.length;
        roadSegments.push({
          index: n,
          p1: { world: { y: n * GAME.segmentLength, z: n * GAME.segmentLength }, camera: {}, screen: {} },
          p2: { world: { y: (n + 1) * GAME.segmentLength, z: (n + 1) * GAME.segmentLength }, camera: {}, screen: {} },
          curve: curve,
          sprites: [],
          color: Math.floor(n / 3) % 2 ? COLORS.grass.dark : COLORS.grass.light
        });
      }
      
      function addRoad(enter, hold, leave, curve, y) {
        const n = enter + hold + leave;
        for (let i = 0; i < enter; i++) addSegment(curve * i / enter, y);
        for (let i = 0; i < hold; i++) addSegment(curve, y);
        for (let i = 0; i < leave; i++) addSegment(curve * (1 - i / leave), y);
      }
      
      // Build track with curves and straights
      addRoad(20, 40, 20, 0, 0);      // Straight
      addRoad(20, 50, 20, -4, 0);     // Left curve
      addRoad(20, 40, 20, 0, 0);      // Straight
      addRoad(20, 50, 20, 4, 0);      // Right curve
      addRoad(20, 60, 20, 0, 0);      // Long straight
      addRoad(20, 40, 20, -3, 0);     // Left curve
      addRoad(20, 40, 20, 3, 0);      // Right curve
      addRoad(20, 100, 20, 0, 0);     // Final straight
      
      // Add roadside objects
      for (let n = 0; n < roadSegments.length; n++) {
        if (n % 20 === 0 && n > 0) {
          // Checkpoint
          roadSegments[n].checkpoint = true;
        }
        
        if (n % 15 === 5) {
          // Palm tree left
          roadSegments[n].sprites.push({ type: 'palm', offset: -2.5, scale: 1.2 });
        }
        
        if (n % 15 === 10) {
          // Palm tree right
          roadSegments[n].sprites.push({ type: 'palm', offset: 2.5, scale: 1.2 });
        }
        
        if (n % 30 === 0 && n > 0) {
          // Beach house left
          roadSegments[n].sprites.push({ type: 'house', offset: -3, scale: 1.5 });
        }
      }
    }
    
    // ========================================
    // 3D PROJECTION
    // ========================================
    function project(p, cameraX, cameraY, cameraZ) {
      p.camera.x = p.world.x - cameraX;
      p.camera.y = p.world.y - cameraY;
      p.camera.z = p.world.z - cameraZ;
      
      p.screen.scale = GAME.cameraDepth / p.camera.z;
      p.screen.x = Math.round((canvas.width / 2) + (p.screen.scale * p.camera.x * canvas.width / 2));
      p.screen.y = Math.round((canvas.height / 2) - (p.screen.scale * p.camera.y * canvas.height / 2));
      p.screen.w = Math.round(p.screen.scale * GAME.roadWidth * canvas.width / 2);
    }
    
    // ========================================
    // RENDERING
    // ========================================
    function drawPolygon(x1, y1, x2, y2, x3, y3, x4, y4, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.lineTo(x4, y4);
      ctx.closePath();
      ctx.fill();
    }
    
    function drawBackground() {
      // Sky gradient
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.6);
      gradient.addColorStop(0, COLORS.sky[0]);
      gradient.addColorStop(0.5, COLORS.sky[1]);
      gradient.addColorStop(1, COLORS.sky[2]);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height * 0.6);
      
      // Hills
      const hillGradient = ctx.createLinearGradient(0, canvas.height * 0.4, 0, canvas.height * 0.7);
      hillGradient.addColorStop(0, COLORS.hills[0]);
      hillGradient.addColorStop(0.5, COLORS.hills[1]);
      hillGradient.addColorStop(1, COLORS.hills[2]);
      ctx.fillStyle = hillGradient;
      
      ctx.beginPath();
      ctx.moveTo(0, canvas.height * 0.6);
      for (let i = 0; i <= 10; i++) {
        const x = (i / 10) * canvas.width;
        const y = canvas.height * 0.5 + Math.sin(i * 0.8 + gameState.position * 0.0001) * 50;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(canvas.width, canvas.height);
      ctx.lineTo(0, canvas.height);
      ctx.closePath();
      ctx.fill();
    }
    
    function drawSegment(segment, fog) {
      const { p1, p2, color } = segment;
      
      const roadColor = Math.floor(segment.index / 3) % 2 ? COLORS.road.dark : COLORS.road.light;
      const rumbleColor = Math.floor(segment.index / 3) % 2 ? COLORS.rumble.dark : COLORS.rumble.light;
      const laneColor = Math.floor(segment.index / 3) % 2 ? COLORS.lane : null;
      
      // Grass
      drawPolygon(
        0, p1.screen.y,
        canvas.width, p1.screen.y,
        canvas.width, p2.screen.y,
        0, p2.screen.y,
        color
      );
      
      // Rumble strips
      drawPolygon(
        p1.screen.x - p1.screen.w - p1.screen.w * 0.2, p1.screen.y,
        p1.screen.x - p1.screen.w, p1.screen.y,
        p2.screen.x - p2.screen.w, p2.screen.y,
        p2.screen.x - p2.screen.w - p2.screen.w * 0.2, p2.screen.y,
        rumbleColor
      );
      
      drawPolygon(
        p1.screen.x + p1.screen.w, p1.screen.y,
        p1.screen.x + p1.screen.w + p1.screen.w * 0.2, p1.screen.y,
        p2.screen.x + p2.screen.w + p2.screen.w * 0.2, p2.screen.y,
        p2.screen.x + p2.screen.w, p2.screen.y,
        rumbleColor
      );
      
      // Road
      drawPolygon(
        p1.screen.x - p1.screen.w, p1.screen.y,
        p1.screen.x + p1.screen.w, p1.screen.y,
        p2.screen.x + p2.screen.w, p2.screen.y,
        p2.screen.x - p2.screen.w, p2.screen.y,
        roadColor
      );
      
      // Lane markers
      if (laneColor && segment.index % 6 === 0) {
        const w = p1.screen.w / 40;
        drawPolygon(
          p1.screen.x - w, p1.screen.y,
          p1.screen.x + w, p1.screen.y,
          p2.screen.x + w, p2.screen.y,
          p2.screen.x - w, p2.screen.y,
          laneColor
        );
      }
      
      // Fog effect
      if (fog > 0) {
        ctx.fillStyle = `rgba(135, 206, 235, ${fog})`;
        ctx.fillRect(0, p2.screen.y, canvas.width, p1.screen.y - p2.screen.y);
      }
    }
    
    function drawSprite(sprite, segment) {
      const { p1 } = segment;
      const scale = p1.screen.scale;
      const x = p1.screen.x + (scale * sprite.offset * GAME.roadWidth * canvas.width / 2);
      const y = p1.screen.y;
      
      if (sprite.type === 'palm') {
        drawPalmTree(x, y, scale * sprite.scale);
      } else if (sprite.type === 'house') {
        drawHouse(x, y, scale * sprite.scale);
      }
    }
    
    function drawPalmTree(x, y, scale) {
      const height = 80 * scale;
      const width = 20 * scale;
      
      // Trunk
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x - width / 2, y, width, -height);
      
      // Palm fronds
      ctx.fillStyle = '#228B22';
      for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2;
        const frondLength = 40 * scale;
        ctx.beginPath();
        ctx.ellipse(
          x + Math.cos(angle) * frondLength / 2,
          y - height + Math.sin(angle) * frondLength / 2,
          frondLength, frondLength / 3, angle, 0, Math.PI * 2
        );
        ctx.fill();
      }
    }
    
    function drawHouse(x, y, scale) {
      const width = 60 * scale;
      const height = 40 * scale;
      const roofHeight = 20 * scale;
      
      // Walls
      ctx.fillStyle = '#FFE4C4';
      ctx.fillRect(x - width / 2, y - height, width, height);
      
      // Blue roof
      ctx.fillStyle = '#4169E1';
      ctx.beginPath();
      ctx.moveTo(x - width / 2, y - height);
      ctx.lineTo(x, y - height - roofHeight);
      ctx.lineTo(x + width / 2, y - height);
      ctx.closePath();
      ctx.fill();
      
      // Window
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(x - width / 4, y - height * 0.6, width / 3, height / 3);
    }
    
    function drawPlayerCar() {
      const baseY = canvas.height - 120;
      const centerX = canvas.width / 2;
      const scale = 3;
      
      // Determine car tilt based on steering
      let tilt = 0;
      if (input.left) tilt = -1;
      if (input.right) tilt = 1;
      
      drawCar380SL(centerX, baseY, scale, tilt);
    }
    
    function drawCar380SL(x, y, scale, tilt) {
      const w = 40 * scale;
      const h = 20 * scale;
      
      ctx.save();
      ctx.translate(x, y);
      
      // Car body (red convertible)
      ctx.fillStyle = CAR_COLORS.red;
      ctx.fillRect(-w / 2, -h, w, h);
      
      // Darker red for depth
      ctx.fillStyle = CAR_COLORS.darkRed;
      ctx.fillRect(-w / 2, -h + h * 0.3, w, h * 0.3);
      
      // Chrome bumper
      ctx.fillStyle = CAR_COLORS.chrome;
      ctx.fillRect(-w / 2, 0, w, h * 0.15);
      
      // Tail lights (ribbed style)
      ctx.fillStyle = '#FF0000';
      const tailWidth = w * 0.15;
      const tailHeight = h * 0.25;
      
      // Left tail light
      ctx.fillRect(-w / 2 + w * 0.05, -h + h * 0.6, tailWidth, tailHeight);
      // Ribbed lines
      ctx.strokeStyle = CAR_COLORS.darkRed;
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const lineY = -h + h * 0.6 + (i / 3) * tailHeight;
        ctx.beginPath();
        ctx.moveTo(-w / 2 + w * 0.05, lineY);
        ctx.lineTo(-w / 2 + w * 0.05 + tailWidth, lineY);
        ctx.stroke();
      }
      
      // Right tail light
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(w / 2 - w * 0.05 - tailWidth, -h + h * 0.6, tailWidth, tailHeight);
      for (let i = 0; i < 4; i++) {
        const lineY = -h + h * 0.6 + (i / 3) * tailHeight;
        ctx.beginPath();
        ctx.moveTo(w / 2 - w * 0.05 - tailWidth, lineY);
        ctx.lineTo(w / 2 - w * 0.05, lineY);
        ctx.stroke();
      }
      
      // Dual exhaust pipes
      ctx.fillStyle = CAR_COLORS.chrome;
      const exhaustR = h * 0.08;
      ctx.beginPath();
      ctx.arc(-w / 4, h * 0.05, exhaustR, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(w / 4, h * 0.05, exhaustR, 0, Math.PI * 2);
      ctx.fill();
      
      // Inner black for exhaust
      ctx.fillStyle = CAR_COLORS.black;
      ctx.beginPath();
      ctx.arc(-w / 4, h * 0.05, exhaustR * 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(w / 4, h * 0.05, exhaustR * 0.6, 0, Math.PI * 2);
      ctx.fill();
      
      // License plate "5ADK 68"
      ctx.fillStyle = CAR_COLORS.yellow;
      const plateW = w * 0.35;
      const plateH = h * 0.2;
      ctx.fillRect(-plateW / 2, -h * 0.15, plateW, plateH);
      
      ctx.fillStyle = CAR_COLORS.black;
      ctx.font = `bold ${h * 0.12}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('5ADK 68', 0, -h * 0.05);
      
      // Driver (woman with long dark hair blowing)
      const driverX = -w * 0.2;
      const driverY = -h * 1.2;
      
      // Hair (animated flow)
      ctx.fillStyle = '#2C1810';
      const hairFlow = Math.sin(Date.now() * 0.005) * 3;
      ctx.beginPath();
      ctx.ellipse(driverX - 8 + hairFlow, driverY, 10, 18, 0.3, 0, Math.PI * 2);
      ctx.fill();
      
      // Head
      ctx.fillStyle = '#FFD7BA';
      ctx.beginPath();
      ctx.arc(driverX, driverY, 6, 0, Math.PI * 2);
      ctx.fill();
      
      // Passenger (dog)
      const dogX = w * 0.2;
      const dogY = -h * 1.1;
      
      // Dog body
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(dogX - 5, dogY - 4, 10, 8);
      
      // Dog head
      ctx.beginPath();
      ctx.arc(dogX, dogY - 8, 5, 0, Math.PI * 2);
      ctx.fill();
      
      // Ears
      ctx.beginPath();
      ctx.ellipse(dogX - 4, dogY - 10, 3, 6, -0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(dogX + 4, dogY - 10, 3, 6, 0.3, 0, Math.PI * 2);
      ctx.fill();
      
      // Snout
      ctx.fillStyle = '#D2B48C';
      ctx.beginPath();
      ctx.ellipse(dogX, dogY - 6, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
    
    function drawHUD() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, 60);
      
      // Responsive font size
      const fontSize = Math.max(16, Math.min(24, canvas.width / 30));
      ctx.font = `bold ${fontSize}px Arial`;
      ctx.fillStyle = '#FFFFFF';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      
      const padding = Math.max(10, canvas.width * 0.02);
      
      // Score
      ctx.fillText(`SCORE: ${gameState.score.toFixed(0)}`, padding, 15);
      
      // Speed
      const speedMPH = Math.round(gameState.speed / 100);
      ctx.textAlign = 'center';
      ctx.fillText(`${speedMPH} MPH`, canvas.width / 2, 15);
      
      // Time
      ctx.textAlign = 'right';
      const timeColor = gameState.time < 10 ? '#FF0000' : '#FFFFFF';
      ctx.fillStyle = timeColor;
      ctx.fillText(`TIME: ${gameState.time.toFixed(1)}s`, canvas.width - padding, 15);
      
      // Game Over
      if (gameState.gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, canvas.height / 2 - 100, canvas.width, 200);
        
        ctx.fillStyle = '#FF0000';
        const titleSize = Math.max(32, Math.min(60, canvas.width / 12));
        ctx.font = `bold ${titleSize}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 30);
        
        ctx.fillStyle = '#FFFFFF';
        const textSize = Math.max(16, Math.min(24, canvas.width / 30));
        ctx.font = `bold ${textSize}px Arial`;
        ctx.fillText(`Final Score: ${gameState.score.toFixed(0)}`, canvas.width / 2, canvas.height / 2 + 30);
        
        // Responsive restart text
        const isMobile = window.matchMedia('(max-width: 768px)').matches;
        const restartText = isMobile ? 'TAP to restart' : 'Press SPACE or TAP to restart';
        ctx.fillText(restartText, canvas.width / 2, canvas.height / 2 + 70);
      }
    }
    
    // ========================================
    // GAME LOGIC
    // ========================================
    function update(dt) {
      if (gameState.gameOver) return;
      
      // Update speed
      if (input.accelerate) {
        gameState.speed = Math.min(gameState.maxSpeed, gameState.speed + gameState.accel * dt);
      } else if (input.brake) {
        gameState.speed = Math.max(0, gameState.speed - gameState.breaking * dt);
      } else {
        gameState.speed = Math.max(0, gameState.speed - gameState.decel * dt);
      }
      
      // Update position
      gameState.position += gameState.speed * dt;
      
      // Wrap around track
      while (gameState.position >= roadSegments.length * GAME.segmentLength) {
        gameState.position -= roadSegments.length * GAME.segmentLength;
      }
      
      // Steering
      const baseIndex = Math.floor(gameState.position / GAME.segmentLength);
      const segment = roadSegments[baseIndex % roadSegments.length];
      const speedPercent = gameState.speed / gameState.maxSpeed;
      const dx = dt * 2 * speedPercent;
      
      if (input.left) {
        gameState.playerX -= dx;
      }
      if (input.right) {
        gameState.playerX += dx;
      }
      
      // Centrifugal force from curves
      gameState.playerX -= (dx * speedPercent * segment.curve * GAME.centrifugal);
      
      // Clamp player position
      gameState.playerX = Math.max(-2.5, Math.min(2.5, gameState.playerX));
      
      // Checkpoint detection
      if (segment.checkpoint && gameState.position - gameState.lastCheckpoint > GAME.segmentLength * 20) {
        gameState.time += 10;
        gameState.score += 500;
        gameState.lastCheckpoint = gameState.position;
      }
      
      // Update time
      gameState.time -= dt;
      if (gameState.time <= 0) {
        gameState.time = 0;
        gameState.gameOver = true;
      }
      
      // Update score
      gameState.score += gameState.speed * dt * 0.01;
    }
    
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      drawBackground();
      
      const baseSegment = Math.floor(gameState.position / GAME.segmentLength);
      const basePercent = (gameState.position % GAME.segmentLength) / GAME.segmentLength;
      
      const cameraY = 1500;
      const cameraZ = gameState.position - GAME.cameraDepth;
      
      let maxY = canvas.height;
      
      for (let n = 0; n < GAME.drawDistance; n++) {
        const segment = roadSegments[(baseSegment + n) % roadSegments.length];
        
        segment.p1.world.x = gameState.playerX * GAME.roadWidth;
        segment.p2.world.x = gameState.playerX * GAME.roadWidth;
        
        project(segment.p1, segment.p1.world.x, cameraY, cameraZ);
        project(segment.p2, segment.p2.world.x, cameraY, cameraZ);
        
        if (segment.p1.camera.z <= GAME.cameraDepth || segment.p2.screen.y >= maxY) {
          continue;
        }
        
        const fog = Math.max(0, Math.min(0.8, 1 - (segment.p1.camera.z / GAME.cameraDepth) / GAME.drawDistance));
        
        drawSegment(segment, fog);
        
        // Draw sprites
        for (let sprite of segment.sprites) {
          drawSprite(sprite, segment);
        }
        
        maxY = segment.p1.screen.y;
      }
      
      drawPlayerCar();
      drawHUD();
    }
    
    // ========================================
    // GAME LOOP
    // ========================================
    function gameLoop(timestamp) {
      const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
      lastTime = timestamp;
      
      update(dt);
      render();
      
      requestAnimationFrame(gameLoop);
    }
    
    // ========================================
    // RESTART FUNCTION
    // ========================================
    function restartGame() {
      gameState = {
        position: 0,
        speed: 0,
        maxSpeed: 12000,
        accel: 3000,
        breaking: 6000,
        decel: 2000,
        playerX: 0,
        time: 60,
        score: 0,
        gameOver: false,
        lastCheckpoint: 0
      };
    }
    
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ' && gameState.gameOver) {
        restartGame();
      }
    });
    
    canvas.addEventListener('click', () => {
      if (gameState.gameOver) {
        restartGame();
      }
    });
    
    // ========================================
    // INITIALIZE
    // ========================================
    createRoad();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
