<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OutRun Me - Amber's SL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      touch-action: none;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    #gameCanvas {
      display: block;
      background: #000;
      image-rendering: pixelated;
      max-width: 100%;
      max-height: 100%;
    }
    
    .touch-zone {
      position: fixed;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
      z-index: 1000;
      border-radius: 50%;
      transition: all 0.15s;
    }
    
    .touch-zone:active {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 200, 50, 0.9);
    }
    
    #leftZone { left: 20px; bottom: 20px; width: 100px; height: 100px; }
    #rightZone { left: 140px; bottom: 20px; width: 100px; height: 100px; }
    #accelZone { right: 140px; bottom: 20px; width: 100px; height: 100px; border-color: rgba(50, 255, 100, 0.5); }
    #brakeZone { right: 20px; bottom: 20px; width: 100px; height: 100px; border-color: rgba(255, 50, 50, 0.5); }
    
    @media (hover: hover) and (min-width: 1024px) {
      .touch-zone { display: none; }
    }
    
    @media (max-width: 480px) and (orientation: portrait) {
      .touch-zone { width: 85px; height: 85px; }
      #rightZone { left: 115px; }
      #accelZone { right: 115px; }
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <div class="touch-zone" id="leftZone">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <path d="M 60 25 L 30 50 L 60 75" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </svg>
  </div>
  
  <div class="touch-zone" id="rightZone">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <path d="M 40 25 L 70 50 L 40 75" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
    </svg>
  </div>
  
  <div class="touch-zone" id="accelZone">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="35" fill="none" stroke="rgba(50, 255, 100, 0.8)" stroke-width="4"/>
      <path d="M 50 30 L 50 70 M 35 45 L 50 30 L 65 45" stroke="rgba(50, 255, 100, 0.9)" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>
  </div>
  
  <div class="touch-zone" id="brakeZone">
    <svg width="100%" height="100%" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="35" fill="none" stroke="rgba(255, 50, 50, 0.8)" stroke-width="4"/>
      <path d="M 50 30 L 50 70 M 35 55 L 50 70 L 65 55" stroke="rgba(255, 50, 50, 0.9)" stroke-width="6" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <script>
    'use strict';
    
    const W = 1280, H = 720, FPS = 60;
    const SEG_LEN = 200, ROAD_W = 2000, TOTAL_SEGS = 2000, DRAW_DIST = 300;
    const CAM = { x: 0, y: 1000, z: 0, depth: 0.84 };
    
    const STAGES = {
      1: {
        name: 'CAPE COD',
        sky: ['#4A90E2', '#5BA3F5', '#87CEEB'],
        ocean: '#1E5F8C',
        sprites: ['lighthouse', 'cottage', 'grass', 'dune']
      },
      2: {
        name: 'BOSTON',
        sky: ['#5BA3F5', '#87CEEB', '#B0D9FF'],
        ocean: '#2874A6',  // Charles River
        sprites: ['building', 'brownstone', 'sign', 'traffic']
      }
    };
    
    let canvas, ctx, segments = [], input = { left: 0, right: 0, accelerate: 0, brake: 0 };
    let game = { pos: 0, speed: 0, playerX: 0, time: 60, score: 0, stage: 1, gameOver: 0, lastCP: 0, frame: 0, stageComplete: 0 };
    let lastTime = 0;
    
    function init() {
      canvas = document.getElementById('gameCanvas');
      ctx = canvas.getContext('2d');
      resize();
      window.addEventListener('resize', resize);
      initInput();
      buildTrack();
      requestAnimationFrame(loop);
    }
    
    function resize() {
      const ratio = W / H, winRatio = innerWidth / innerHeight;
      if (winRatio > ratio) {
        canvas.height = innerHeight;
        canvas.width = innerHeight * ratio;
      } else {
        canvas.width = innerWidth;
        canvas.height = innerWidth / ratio;
      }
      canvas.width = W;
      canvas.height = H;
    }
    
    function initInput() {
      document.addEventListener('keydown', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = 1;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = 1;
        if (e.key === 'ArrowUp' || e.key === 'w') input.accelerate = 1;
        if (e.key === 'ArrowDown' || e.key === 's') input.brake = 1;
        if (e.key === ' ' && game.gameOver) restart();
        if (e.key === ' ' && game.stageComplete) nextStage();
      });
      
      document.addEventListener('keyup', e => {
        if (e.key === 'ArrowLeft' || e.key === 'a') input.left = 0;
        if (e.key === 'ArrowRight' || e.key === 'd') input.right = 0;
        if (e.key === 'ArrowUp' || e.key === 'w') input.accelerate = 0;
        if (e.key === 'ArrowDown' || e.key === 's') input.brake = 0;
      });
      
      ['leftZone', 'rightZone', 'accelZone', 'brakeZone'].forEach((id, i) => {
        const el = document.getElementById(id), key = ['left', 'right', 'accelerate', 'brake'][i];
        el.addEventListener('touchstart', e => { e.preventDefault(); input[key] = 1; }, { passive: false });
        el.addEventListener('touchend', e => { e.preventDefault(); input[key] = 0; }, { passive: false });
        el.addEventListener('mousedown', () => input[key] = 1);
        el.addEventListener('mouseup', () => input[key] = 0);
        el.addEventListener('mouseleave', () => input[key] = 0);
      });
      
      canvas.addEventListener('click', () => {
        if (game.gameOver) restart();
        if (game.stageComplete) nextStage();
      });
    }
    
    function buildTrack() {
      segments = [];
      for (let i = 0; i < TOTAL_SEGS; i++) {
        const z = i * SEG_LEN;
        let curve = 0, y = 0;
        
        if (i > 200 && i < 500) {
          y = Math.sin((i - 200) * 0.02) * 1500;
        }
        if (i > 500 && i < 650) curve = -6;
        if (i > 700 && i < 850) curve = 8;
        if (i > 900 && i < 1050) curve = -8;
        if (i > 1100 && i < 1250) curve = 6;
        
        segments.push({
          i,
          p1: { w: { x: 0, y, z }, s: { x: 0, y: 0, w: 0 } },
          p2: { w: { x: 0, y, z: z + SEG_LEN }, s: { x: 0, y: 0, w: 0 } },
          curve,
          sprites: [],
          checkpoint: i % 300 === 0 && i > 0
        });
      }
      
      // Add stage-specific sprites
      const stage = STAGES[game.stage];
      segments.forEach((seg, n) => {
        if (game.stage === 1) {
          if (n % 400 === 50) seg.sprites.push({ t: 'lighthouse', o: -2.5, s: 1.8 });
          if (n % 200 === 100) seg.sprites.push({ t: 'cottage', o: 2.5, s: 1.5 });
          if (n % 30 === 10) seg.sprites.push({ t: 'grass', o: -2.2, s: 0.8 });
          if (n % 30 === 20) seg.sprites.push({ t: 'grass', o: 2.2, s: 0.8 });
          if (n % 150 === 75) seg.sprites.push({ t: 'dune', o: -3, s: 1.2 });
        } else if (game.stage === 2) {
          if (n % 300 === 50) seg.sprites.push({ t: 'building', o: -3, s: 2.5 });
          if (n % 200 === 80) seg.sprites.push({ t: 'brownstone', o: 2.5, s: 1.8 });
          if (n % 100 === 40) seg.sprites.push({ t: 'sign', o: -2.2, s: 1 });
          if (n % 50 === 25) seg.sprites.push({ t: 'traffic', o: 1.5, s: 1.2 });
        }
      });
    }
    
    function project(p, cx, cy, cz) {
      const wx = p.w.x - cx, wy = p.w.y - cy, wz = p.w.z - cz;
      if (wz <= 0) { p.s.scale = 0; return; }
      const scale = CAM.depth / wz;
      p.s.scale = scale;
      p.s.x = (W / 2) + wx * scale * (W / 2);
      p.s.y = (H / 2) - wy * scale * (H / 2);
      p.s.w = scale * ROAD_W * (W / 2);
    }
    
    function update(dt) {
      if (game.gameOver || game.stageComplete) return;
      
      game.frame++;
      
      if (input.accelerate) game.speed = Math.min(280, game.speed + 0.3 * dt);
      else if (input.brake) game.speed = Math.max(0, game.speed - 0.8 * dt);
      else game.speed = Math.max(0, game.speed - 0.15 * dt);
      
      game.pos += game.speed * dt * SEG_LEN / 60;
      
      while (game.pos >= TOTAL_SEGS * SEG_LEN) game.pos -= TOTAL_SEGS * SEG_LEN;
      
      const segIdx = Math.floor(game.pos / SEG_LEN) % TOTAL_SEGS;
      const seg = segments[segIdx];
      const speedPct = game.speed / 280;
      
      if (input.left) game.playerX -= 0.004 * dt;
      if (input.right) game.playerX += 0.004 * dt;
      
      game.playerX -= 0.004 * speedPct * seg.curve * 0.25 * dt;
      
      if (Math.abs(game.playerX) > 0.8) {
        game.speed = Math.max(0, game.speed - 0.8 * dt);
      }
      
      game.playerX = Math.max(-3, Math.min(3, game.playerX));
      
      if (seg.checkpoint && game.pos - game.lastCP > SEG_LEN * 280) {
        game.time += 15;
        game.score += 1000;
        game.lastCP = game.pos;
      }
      
      game.time -= dt / 60;
      if (game.time <= 0) {
        game.time = 0;
        game.gameOver = 1;
      }
      
      // Check stage completion (lap complete)
      if (game.pos > (TOTAL_SEGS - 100) * SEG_LEN && game.stage === 1) {
        game.stageComplete = 1;
        game.time += 30; // Bonus time for next stage
      }
      
      game.score += game.speed * dt * 0.05;
    }
    
    function render() {
      ctx.clearRect(0, 0, W, H);
      
      const stage = STAGES[game.stage];
      
      // Sky
      const grad = ctx.createLinearGradient(0, 0, 0, H * 0.5);
      stage.sky.forEach((c, i) => grad.addColorStop(i / (stage.sky.length - 1), c));
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H * 0.5);
      
      // Ocean/River
      ctx.fillStyle = stage.ocean;
      ctx.fillRect(0, H * 0.46, W, H * 0.08);
      
      // Road
      const baseIdx = Math.floor(game.pos / SEG_LEN) % TOTAL_SEGS;
      const cx = game.playerX * ROAD_W, cy = CAM.y, cz = game.pos;
      let maxY = H;
      
      for (let n = 0; n < DRAW_DIST; n++) {
        const idx = (baseIdx + n) % TOTAL_SEGS;
        const seg = segments[idx];
        
        project(seg.p1, cx, cy, cz);
        project(seg.p2, cx, cy, cz);
        
        if (seg.p1.s.scale === 0 || seg.p1.s.y >= maxY) continue;
        
        const grass = Math.floor(seg.i / 3) % 2 ? '#228B22' : '#2ECC40';
        const road = Math.floor(seg.i / 3) % 2 ? '#505050' : '#6B6B6B';
        const rumble = Math.floor(seg.i / 3) % 2 ? '#CC0000' : '#FFFFFF';
        
        ctx.fillStyle = grass;
        ctx.fillRect(0, seg.p2.s.y, W, seg.p1.s.y - seg.p2.s.y);
        
        ctx.fillStyle = rumble;
        poly(seg.p1.s.x - seg.p1.s.w - seg.p1.s.w * 0.15, seg.p1.s.y, seg.p1.s.x - seg.p1.s.w, seg.p1.s.y, seg.p2.s.x - seg.p2.s.w, seg.p2.s.y, seg.p2.s.x - seg.p2.s.w - seg.p2.s.w * 0.15, seg.p2.s.y);
        poly(seg.p1.s.x + seg.p1.s.w, seg.p1.s.y, seg.p1.s.x + seg.p1.s.w + seg.p1.s.w * 0.15, seg.p1.s.y, seg.p2.s.x + seg.p2.s.w + seg.p2.s.w * 0.15, seg.p2.s.y, seg.p2.s.x + seg.p2.s.w, seg.p2.s.y);
        
        ctx.fillStyle = road;
        poly(seg.p1.s.x - seg.p1.s.w, seg.p1.s.y, seg.p1.s.x + seg.p1.s.w, seg.p1.s.y, seg.p2.s.x + seg.p2.s.w, seg.p2.s.y, seg.p2.s.x - seg.p2.s.w, seg.p2.s.y);
        
        if (Math.floor(seg.i / 3) % 2 === 0 && seg.i % 8 === 0) {
          ctx.fillStyle = '#FFFF00';
          const lw = seg.p1.s.w / 30;
          poly(seg.p1.s.x - lw, seg.p1.s.y, seg.p1.s.x + lw, seg.p1.s.y, seg.p2.s.x + lw, seg.p2.s.y, seg.p2.s.x - lw, seg.p2.s.y);
        }
        
        seg.sprites.forEach(sp => drawSprite(sp, seg));
        
        maxY = seg.p1.s.y;
      }
      
      // Player car
      drawCar(W / 2, H - 140, 3.5, input.left ? 'left' : input.right ? 'right' : 'straight');
      
      // HUD
      drawHUD();
    }
    
    function poly(x1, y1, x2, y2, x3, y3, x4, y4) {
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.lineTo(x4, y4);
      ctx.closePath();
      ctx.fill();
    }
    
    function drawSprite(sp, seg) {
      const scale = seg.p1.s.scale * sp.s;
      const x = seg.p1.s.x + sp.o * seg.p1.s.w;
      const y = seg.p1.s.y;
      if (scale <= 0) return;
      
      ctx.save();
      ctx.translate(x, y);
      
      if (sp.t === 'building') {
        const w = 80 * scale, h = 180 * scale;
        ctx.fillStyle = '#7F8C8D';
        ctx.fillRect(-w / 2, -h, w, h);
        for (let i = 0; i < 8; i++) {
          for (let j = 0; j < 4; j++) {
            ctx.fillStyle = i % 2 === 0 && j % 2 === 0 ? '#F39C12' : '#2C3E50';
            ctx.fillRect(-w / 2 + j * w / 4, -h + i * h / 8, w / 5, h / 10);
          }
        }
      } else if (sp.t === 'brownstone') {
        const w = 60 * scale, h = 80 * scale;
        ctx.fillStyle = '#8B4513';
        ctx.fillRect(-w / 2, -h, w, h);
        ctx.fillStyle = '#654321';
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(-w / 2 + i * w / 3, -h * 0.7, w / 4, h / 3);
        }
        ctx.fillStyle = '#5D4E37';
        ctx.beginPath();
        ctx.moveTo(-w / 2, -h);
        ctx.lineTo(0, -h - h * 0.2);
        ctx.lineTo(w / 2, -h);
        ctx.closePath();
        ctx.fill();
      } else if (sp.t === 'sign') {
        const w = 50 * scale, h = 30 * scale;
        ctx.fillStyle = '#27AE60';
        ctx.fillRect(-w / 2, -h, w, h);
        ctx.fillStyle = '#FFF';
        ctx.font = `bold ${h * 0.4}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('CHARLES ST', 0, -h / 2 + h * 0.15);
        ctx.fillText('EXIT', 0, -h / 2 + h * 0.45);
      } else if (sp.t === 'traffic') {
        const w = 35 * scale, h = 20 * scale;
        const colors = ['#F4D03F', '#E67E22', '#95A5A6'];
        ctx.fillStyle = colors[Math.floor(game.frame / 100) % colors.length];
        ctx.fillRect(-w / 2, -h, w, h);
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(-w / 2 + w * 0.1, -h * 0.7, w * 0.15, h * 0.3);
        ctx.fillRect(w / 2 - w * 0.25, -h * 0.7, w * 0.15, h * 0.3);
      } else if (sp.t === 'lighthouse') {
        const w = 30 * scale, h = 140 * scale;
        ctx.fillStyle = '#F5F5F5';
        ctx.fillRect(-w / 2, -h, w, h * 0.85);
        ctx.fillStyle = '#DC143C';
        ctx.fillRect(-w / 2, -h * 0.6, w, h * 0.15);
        ctx.fillStyle = '#1C1C1C';
        ctx.fillRect(-w / 1.5, -h, w * 1.3, h * 0.15);
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(0, -h + h * 0.075, w * 0.4, 0, Math.PI * 2);
        ctx.fill();
      } else if (sp.t === 'cottage') {
        const w = 70 * scale, h = 50 * scale;
        ctx.fillStyle = '#8B7355';
        ctx.fillRect(-w / 2, -h, w, h);
        ctx.fillStyle = '#5D4E37';
        ctx.beginPath();
        ctx.moveTo(-w / 2, -h);
        ctx.lineTo(0, -h - h * 0.4);
        ctx.lineTo(w / 2, -h);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#4A90E2';
        ctx.fillRect(-w / 4, -h * 0.6, w / 2.5, h / 3);
      } else if (sp.t === 'grass') {
        const h = 40 * scale;
        ctx.strokeStyle = '#9ACD32';
        ctx.lineWidth = 2 * scale;
        ctx.lineCap = 'round';
        for (let i = 0; i < 5; i++) {
          const bx = (i - 2) * 5 * scale + Math.sin(game.frame * 0.05 + i) * 3 * scale;
          ctx.beginPath();
          ctx.moveTo((i - 2) * 5 * scale, 0);
          ctx.quadraticCurveTo(bx, -h / 2, bx, -h);
          ctx.stroke();
        }
      } else if (sp.t === 'dune') {
        const w = 100 * scale, h = 40 * scale;
        ctx.fillStyle = '#F4D03F';
        ctx.beginPath();
        ctx.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI, true);
        ctx.fill();
      }
      
      ctx.restore();
    }
    
    function drawCar(x, y, s, state) {
      const w = 45 * s, h = 22 * s;
      ctx.save();
      ctx.translate(x, y);
      if (state === 'left') ctx.transform(1, 0, -0.15, 1, 0, 0);
      if (state === 'right') ctx.transform(1, 0, 0.15, 1, 0, 0);
      
      ctx.fillStyle = '#DC143C';
      ctx.fillRect(-w / 2, -h, w, h);
      ctx.fillStyle = '#8B0000';
      ctx.fillRect(-w / 2, -h * 0.5, w, h * 0.5);
      ctx.fillStyle = '#C0C0C0';
      ctx.fillRect(-w / 2, 0, w, h * 0.2);
      
      ctx.fillStyle = '#FF0000';
      ctx.fillRect(-w / 2 + w * 0.1, -h * 0.65, w * 0.15, h * 0.3);
      ctx.fillRect(w / 2 - w * 0.25, -h * 0.65, w * 0.15, h * 0.3);
      
      ctx.fillStyle = '#808080';
      ctx.beginPath();
      ctx.arc(-w / 4, h * 0.08, h * 0.12, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(w / 4, h * 0.08, h * 0.12, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#FFD700';
      const pw = w * 0.5, ph = h * 0.22;
      ctx.fillRect(-pw / 2, -h * 0.2, pw, ph);
      ctx.fillStyle = '#000';
      ctx.font = `bold ${h * 0.14}px Courier`;
      ctx.textAlign = 'center';
      ctx.fillText('5ADK 68', 0, -h * 0.09);
      
      const hairFlow = Math.sin(game.frame * 0.08 + game.speed * 0.01) * 6 * (game.speed / 280);
      ctx.fillStyle = '#2C1810';
      ctx.beginPath();
      ctx.ellipse(-w * 0.22 - 10 + hairFlow, -h * 1.4, 12, 22, 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#FFD7BA';
      ctx.beginPath();
      ctx.arc(-w * 0.22, -h * 1.4, 7, 0, Math.PI * 2);
      ctx.fill();
      
      const earFlow = Math.sin(game.frame * 0.08) * 4 * (game.speed / 280);
      ctx.fillStyle = '#8B7355';
      ctx.fillRect(w * 0.22 - 6, -h * 1.25 - 2, 12, 10);
      ctx.beginPath();
      ctx.arc(w * 0.22, -h * 1.25 - 10, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(w * 0.22 - 5 - earFlow * 0.5, -h * 1.25 - 12, 4, 8, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(w * 0.22 + 5 + earFlow * 0.5, -h * 1.25 - 12, 4, 8, 0.4, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.restore();
    }
    
    function drawHUD() {
      const stage = STAGES[game.stage];
      
      // Time box (top left)
      ctx.fillStyle = 'rgba(128, 128, 128, 0.8)';
      ctx.fillRect(20, 20, 180, 50);
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 16px Courier';
      ctx.textAlign = 'left';
      ctx.fillText('TIME', 30, 40);
      ctx.fillStyle = game.time < 15 ? '#FF0000' : '#00FF00';
      ctx.font = 'bold 24px Courier';
      ctx.fillText(game.time.toFixed(1), 30, 62);
      
      // Speed box (below time)
      ctx.fillStyle = 'rgba(128, 128, 128, 0.8)';
      ctx.fillRect(20, 80, 180, 50);
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 16px Courier';
      ctx.fillText('SPEED', 30, 100);
      ctx.fillStyle = '#FF0000';
      ctx.font = 'bold 24px Courier';
      ctx.fillText(`${Math.round(game.speed * 1.6)} KM/H`, 30, 122);
      
      // Title (center top)
      ctx.fillStyle = '#FF6B35';
      ctx.font = 'bold 36px Courier';
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText("OUTRUN ME", W / 2, 40);
      ctx.fillText("OUTRUN ME", W / 2, 40);
      ctx.fillStyle = '#FFD700';
      ctx.strokeText("AMBER'S SL", W / 2, 75);
      ctx.fillText("AMBER'S SL", W / 2, 75);
      
      // Stage box (top right)
      ctx.fillStyle = 'rgba(128, 128, 128, 0.8)';
      ctx.fillRect(W - 200, 20, 180, 50);
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 20px Courier';
      ctx.textAlign = 'right';
      ctx.fillText(`STAGE ${game.stage}`, W - 30, 45);
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 16px Courier';
      ctx.fillText(stage.name, W - 30, 62);
      
      // Score box (below stage)
      ctx.fillStyle = 'rgba(128, 128, 128, 0.8)';
      ctx.fillRect(W - 200, 80, 180, 50);
      ctx.fillStyle = '#FFF';
      ctx.font = 'bold 16px Courier';
      ctx.fillText('SCORE', W - 30, 100);
      ctx.font = 'bold 20px Courier';
      ctx.fillText(Math.floor(game.score), W - 30, 122);
      
      // Game Over
      if (game.gameOver) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, H / 2 - 120, W, 240);
        ctx.fillStyle = '#FF0000';
        ctx.font = 'bold 72px Courier';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 32px Courier';
        ctx.fillText(`FINAL SCORE: ${Math.floor(game.score)}`, W / 2, H / 2 + 40);
        ctx.font = 'bold 24px Courier';
        ctx.fillText('TAP OR PRESS SPACE TO RESTART', W / 2, H / 2 + 90);
      }
      
      // Stage Complete
      if (game.stageComplete) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
        ctx.fillRect(0, H / 2 - 120, W, 240);
        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 72px Courier';
        ctx.textAlign = 'center';
        ctx.fillText('STAGE CLEAR!', W / 2, H / 2 - 20);
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 32px Courier';
        ctx.fillText(`BONUS: +30 SECONDS`, W / 2, H / 2 + 40);
        ctx.fillStyle = '#FFF';
        ctx.font = 'bold 24px Courier';
        ctx.fillText('TAP OR PRESS SPACE FOR NEXT STAGE', W / 2, H / 2 + 90);
      }
    }
    
    function restart() {
      game = { pos: 0, speed: 0, playerX: 0, time: 60, score: 0, stage: 1, gameOver: 0, lastCP: 0, frame: 0, stageComplete: 0 };
      buildTrack();
    }
    
    function nextStage() {
      game.stage = 2;
      game.pos = 0;
      game.speed = 0;
      game.playerX = 0;
      game.lastCP = 0;
      game.stageComplete = 0;
      buildTrack();
    }
    
    function loop(t) {
      const dt = Math.min((t - lastTime) / (1000 / FPS), 5);
      lastTime = t;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }
    
    init();
  </script>
</body>
</html>
